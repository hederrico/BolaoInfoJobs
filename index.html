      const rk=g.type==="group"?("R"+(g.matchday||"?")):g.type;
      const lab=g.type==="group"?("Rodada "+(g.matchday||"?")):(ROUND_NM[g.type]||g.type);
      if(!byRound[rk])byRound[rk]={label:lab,pts:0};byRound[rk].pts+=r.p;
      [g.home_team_id,g.away_team_id].forEach(t=>{if(t&&t!=="0")byTeam[t]=(byTeam[t]||0)+r.p;});
    }});
  const rounds=Object.values(byRound);let best=null,worst=null;
  rounds.forEach(rr=>{if(!best||rr.pts>best.pts)best=rr;if(!worst||rr.pts<worst.pts)worst=rr;});
  let streak=0;for(let i=seq.length-1;i>=0;i--){if(seq[i])streak++;else break;}
  let bestStreak=0,cur=0;seq.forEach(s=>{if(s){cur++;if(cur>bestStreak)bestStreak=cur;}else cur=0;});
  const topTeams=Object.entries(byTeam).map(([id,pt])=>({id:+id,pt})).sort((a,b)=>b.pt-a.pt).filter(t=>t.pt>0).slice(0,6);
  return {crav,venc,err,semP,nPalp,sumPts,aprov:nPalp?(sumPts/(nPalp*6))*100:0,best,worst,streak,bestStreak,topTeams,total:(BASELINE[p]||0)+sumPts};
}
// DNA do palpiteiro: tendências sobre TODOS os palpites do jogador (não só os encerrados)
function palpiteDNA(p){
  let n=0,goals=0,h=0,d=0;const cnt={};
  GAMES.forEach(g=>{const gx=(GUESS[g.id]||{})[p];if(!gx)return;
    const A=gx.a,B=gx.b;if(A===""||A==null||B===""||B==null)return;
    const ai=+A,bi=+B;if(isNaN(ai)||isNaN(bi))return;
    n++;goals+=ai+bi;if(ai>bi)h++;else if(ai===bi)d++;
    const k=ai+"×"+bi;cnt[k]=(cnt[k]||0)+1;});
  let fav=null,favC=0;Object.entries(cnt).forEach(([k,c])=>{if(c>favC){favC=c;fav=k;}});
  const avg=n?goals/n:0,pctH=n?Math.round(h/n*100):0,pctD=n?Math.round(d/n*100):0;
  const estilo=!n?"—":avg>=3.2?"Chuva de gols":avg>=2.3?"Ofensivo":avg>=1.6?"Equilibrado":"Cadeado";
  return {n,fav,favC,avg,pctH,pctD,pctA:n?100-pctH-pctD:0,estilo};
}
// melhor sacada (cravou/acertou o que poucos acertaram) e maior vacilo (errou o que quase todos acertaram)
function playerMoments(p){
  let best=null,worst=null;const TOT=PLAYERS.length;
  GAMES.filter(g=>classify(g)==="finished").forEach(g=>{const[ra,rb]=res(g);if(ra==null)return;
    const gx=(GUESS[g.id]||{})[p];const hasP=gx&&gx.a!==""&&gx.a!=null&&gx.b!==""&&gx.b!=null;if(!hasP)return;
    const mine=pts(gx,ra,rb,false);if(mine.p==null)return;
    // conta sobre TODO o bolão (10): quem não palpitou simplesmente não pontuou
    let scored=0,craved=0,others=0,oSum=0;
    PLAYERS.forEach(q=>{const qx=(GUESS[g.id]||{})[q];
      const qh=qx&&qx.a!==""&&qx.a!=null&&qx.b!==""&&qx.b!=null;if(!qh)return;
      const r=pts(qx,ra,rb,false);if(r.p==null)return;
      if(r.p>0)scored++;if(r.k==="cravou")craved++;
      if(q!==p){others++;oSum+=r.p;}});
    const diff=mine.p-(others?oSum/others:0);
    const rec={g,ra,rb,gx,myPts:mine.p,k:mine.k,scored,craved,tot:TOT,diff};
    if(mine.p>0&&(!best||diff>best.diff||(diff===best.diff&&mine.p>best.myPts)))best=rec;
    if(mine.p===0&&scored>0&&(!worst||diff<worst.diff||(diff===worst.diff&&scored>worst.scored)))worst=rec;
  });
  return {best,worst};
}

function momentText(rec,kind){const palp=rec.gx.a+"×"+rec.gx.b,T=rec.tot;let ph;

// definição das estatísticas comparadas (dir: 1 = maior melhor, -1 = menor melhor, 0 = sem destaque)
function cmpDefs(){
  const rr=rankRows(),byP={};rr.forEach(r=>byP[r.p]=r);
  const avg=rr.length?rr.reduce((s,r)=>s+r.t,0)/rr.length:0;
  const S={},D={};PLAYERS.forEach(p=>{S[p]=null;D[p]=null;});
  const st=p=>(S[p]||(S[p]=playerStats(p))),dn=p=>(D[p]||(D[p]=palpiteDNA(p)));
  const tot=p=>byP[p]?byP[p].t:st(p).total;
  return [
    {label:"Posição",dir:-1,get:p=>byP[p]?byP[p].rank:99,fmt:v=>"#"+v},
    {label:"Pontos",dir:1,get:tot,fmt:v=>String(v)},
    {label:"Cravadas",dir:1,get:p=>st(p).crav,fmt:v=>String(v)},
    {label:"Acertos",dir:1,get:p=>st(p).venc,fmt:v=>String(v)},
    {label:"Erros",dir:-1,get:p=>st(p).err,fmt:v=>String(v)},
    {label:"Aproveit.",dir:1,get:p=>st(p).aprov,fmt:v=>Math.round(v)+"%"},
    {label:"Palpites",dir:0,get:p=>st(p).nPalp,fmt:v=>String(v)},
    {label:"Sequência",dir:1,get:p=>st(p).streak,fmt:v=>v+"j"},
    {label:"Recorde seq.",dir:1,get:p=>st(p).bestStreak,fmt:v=>v+"j"},
    {label:"vs. média",dir:1,get:p=>Math.round(tot(p)-avg),fmt:v=>(v>=0?"+":"")+v},
    {label:"Gols/palpite",dir:0,get:p=>dn(p).avg,fmt:v=>v.toFixed(1)},
    {label:"Placar fav.",dir:0,text:true,get:p=>dn(p).fav||"—"},
    {label:"Estilo",dir:0,text:true,get:p=>dn(p).estilo}
  ];
}
// monta as linhas (com destaque de quem lidera) + o placar de quesitos por jogador
function cmpCompute(players){
  const defs=cmpDefs(),wins={};players.forEach(p=>wins[p]=0);
  const rows=defs.map(d=>{
    const raws=players.map(d.get);
    const cells=players.map((p,i)=>({raw:raws[i],disp:d.text?String(raws[i]):d.fmt(raws[i]),win:false}));
    if(d.dir!==0&&players.length>1){
      const nums=raws.filter(v=>typeof v==="number"&&!isNaN(v));
      if(nums.length){
        const best=d.dir>0?Math.max.apply(null,nums):Math.min.apply(null,nums);
        const allSame=nums.every(v=>v===nums[0]);
        if(!allSame)cells.forEach((c,i)=>{if(c.raw===best){c.win=true;wins[players[i]]++;}});
      }
    }
    return {label:d.label,text:!!d.text,cells};
  });
  let maxWins=0;players.forEach(p=>{if(wins[p]>maxWins)maxWins=wins[p];});
  const hdr=players.map(p=>({p,quesitos:wins[p],lead:maxWins>0&&wins[p]===maxWins}));
  return {rows,hdr};
}

async function tick(initial){

// mesma lógica do buildGeral: pontos iguais = mesma colocação (compRanks) +
// setinha de movimento = posição antes dos jogos ao vivo x agora (somando os jogos em paralelo)
function rankRows(){
  const baseT={};PLAYERS.forEach(p=>baseT[p]=(BASELINE[p]||0));
  GAMES.forEach(g=>{if(classify(g)!=="finished")return;const[ra,rb]=res(g);
    PLAYERS.forEach(p=>{const r=pts((GUESS[g.id]||{})[p],ra,rb,false);if(r.p!=null)baseT[p]+=r.p;});});
  const tot={};PLAYERS.forEach(p=>tot[p]=baseT[p]);
  GAMES.forEach(g=>{if(classify(g)!=="live")return;const[ra,rb]=res(g);
    PLAYERS.forEach(p=>{const r=pts((GUESS[g.id]||{})[p],ra,rb,true);if(r.p!=null)tot[p]+=r.p;});});
  const basePos={};compRanks(PLAYERS.map(p=>({p,v:baseT[p]})).sort((a,b)=>b.v-a.v),r=>r.v).forEach(r=>basePos[r.p]=r.rank);
  const rows=PLAYERS.map(p=>({p,t:tot[p]})).sort((a,b)=>b.t-a.t);
  compRanks(rows,r=>r.t);
  rows.forEach(r=>r.mv=basePos[r.p]-r.rank); // + = subiu desde antes dos jogos de agora
  return rows;
}
function rrect(x,X,Y,W,H,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+W,Y,X+W,Y+H,r);x.arcTo(X+W,Y+H,X,Y+H,r);x.arcTo(X,Y+H,X,Y,r);x.arcTo(X,Y,X+W,Y,r);x.closePath();}
// rasteriza um SVG (string) em Image, sem sujar o canvas (data URI URI-encoded)
function svgToImage(svg){return new Promise(res=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);
  im.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);});}
// quebra texto em até maxLines linhas (com … na última se estourar)
function wrapText(x,text,X,Y,maxW,lh,maxLines){const words=String(text).split(" ");let line="",ln=0;
  for(let i=0;i<words.length;i++){const test=line?line+" "+words[i]:words[i];
    if(x.measureText(test).width>maxW&&line){
      if(ln>=maxLines-1){let rest=words.slice(i).join(" ");const full=rest;
        while(rest.length>1&&x.measureText(line+" "+rest+"…").width>maxW)rest=rest.slice(0,-1);
        x.fillText(line+" "+rest+(rest!==full?"…":""),X,Y+ln*lh);return;}
      x.fillText(line,X,Y+ln*lh);ln++;line=words[i];}
    else line=test;}
  x.fillText(line,X,Y+ln*lh);}
// ---- bandeiras no canvas (flagcdn manda Access-Control-Allow-Origin:* -> crossOrigin não suja o canvas) ----
const _flagImg={};
function loadFlag(id){return new Promise(res=>{
  if(!id||!TEAMS[id]){res(null);return;}
  const url=flag(id,80);
  if(url in _flagImg){res(_flagImg[url]);return;}
  const im=new Image();im.crossOrigin="anonymous";
  im.onload=()=>{_flagImg[url]=im;res(im);};
  im.onerror=()=>{_flagImg[url]=null;res(null);};
  im.src=url;
});}
async function loadFlags(ids){
  const u=[...new Set(ids.map(String).filter(id=>id&&id!=="0"))];
  const arr=await Promise.all(u.map(id=>loadFlag(+id)));
  const m={};u.forEach((id,i)=>m[id]=arr[i]);
  return id=>m[String(id)]||null;
}
function drawFlag(x,im,X,Y,W,H){
  if(!im){x.fillStyle="rgba(255,255,255,.06)";rrect(x,X,Y,W,H,3);x.fill();
    x.strokeStyle="rgba(255,255,255,.1)";x.lineWidth=1;rrect(x,X,Y,W,H,3);x.stroke();return;}
  x.save();rrect(x,X,Y,W,H,3);x.clip();
  const ir=im.naturalWidth/im.naturalHeight,tr=W/H;let dw,dh,dx,dy;
  if(ir>tr){dh=H;dw=H*ir;dx=X-(dw-W)/2;dy=Y;}else{dw=W;dh=W/ir;dx=X;dy=Y-(dh-H)/2;}
  x.drawImage(im,dx,dy,dw,dh);x.restore();
  x.strokeStyle="rgba(255,255,255,.18)";x.lineWidth=1;rrect(x,X,Y,W,H,3);x.stroke();
}

  if(dna.n){secTitle("DNA do palpiteiro");
    const dg=8,dw=(CW-dg)/2,dh=56;
    [["Placar favorito",(dna.fav||"—")+(dna.favC>1?(" · "+dna.favC+"×"):"")],["Gols por palpite",dna.avg.toFixed(1)]]
      .forEach((t,i)=>{const tx=P+i*(dw+dg);tile(tx,Y,dw,dh);
        x.textAlign="left";x.font="600 9px Inter,Arial,sans-serif";x.fillStyle="#8A98A8";x.fillText(t[0].toUpperCase(),tx+12,Y+20);
        x.font="800 21px 'Barlow Condensed',sans-serif";x.fillStyle="#EAF0F6";x.fillText(t[1],tx+12,Y+44);});
    let Yd=Y+dh+8;const tbH=72;tile(P,Yd,CW,tbH);
    x.textAlign="left";x.font="600 9px Inter,Arial,sans-serif";x.fillStyle="#8A98A8";x.fillText("PRA QUEM VOCÊ APOSTA",P+12,Yd+18);
    const bX=P+12,bW=CW-24,bY=Yd+28,bH=11;
    const wh=bW*dna.pctH/100,wd=bW*dna.pctD/100;
    x.save();rrect(x,bX,bY,bW,bH,5);x.clip();
    x.fillStyle="#1FB57A";x.fillRect(bX,bY,wh,bH);x.fillStyle="#6B7785";x.fillRect(bX+wh,bY,wd,bH);
    x.fillStyle="#E6B450";x.fillRect(bX+wh+wd,bY,bW-wh-wd,bH);x.restore();
    x.font="600 11px Inter,Arial,sans-serif";
    x.textAlign="left";x.fillStyle="#8A98A8";x.fillText("Mandante "+dna.pctH+"%",bX,Yd+58);
    x.textAlign="center";x.fillText("Empate "+dna.pctD+"%",W/2,Yd+58);
    x.textAlign="right";x.fillText("Visitante "+dna.pctA+"%",bX+bW,Yd+58);
    let Yt=Yd+tbH+8;x.textAlign="left";x.font="700 12px Inter,Arial,sans-serif";
    const tw2=x.measureText(dna.estilo).width+22;x.fillStyle="rgba(230,180,80,.12)";rrect(x,P,Yt,tw2,26,13);x.fill();
    x.strokeStyle="rgba(230,180,80,.3)";rrect(x,P,Yt,tw2,26,13);x.stroke();
    x.fillStyle="#E6B450";x.fillText(dna.estilo,P+11,Yt+17);
    Y+=hDna+GAP;
  }
  // momentos
  if(momCards.length){secTitle("Momentos da campanha");
    momCards.forEach(([kind,rec])=>{const mh=66,cy=Y+mh/2;
      x.fillStyle="#141A22";rrect(x,P,Y,CW,mh,10);x.fill();
      x.strokeStyle=kind==="best"?"rgba(31,181,122,.4)":"rgba(224,106,115,.38)";x.lineWidth=1.4;rrect(x,P,Y,CW,mh,10);x.stroke();
      drawFlag(x,F(rec.g.home_team_id),P+14,cy-9,24,17);
      x.textAlign="center";x.font="800 21px 'Barlow Condensed',sans-serif";x.fillStyle="#EAF0F6";x.fillText(rec.ra+"×"+rec.rb,P+14+24+26,cy+7);
      drawFlag(x,F(rec.g.away_team_id),P+14+24+52,cy-9,24,17);
      const ix=P+14+24+52+24+16;
      x.textAlign="left";x.font="700 10px Inter,Arial,sans-serif";x.fillStyle=kind==="best"?"#1FB57A":"#E06A73";
      x.fillText(kind==="best"?"MELHOR SACADA":"MAIOR VACILO",ix,Y+24);
      x.font="600 12px Inter,Arial,sans-serif";x.fillStyle="#C7D0DA";
      wrapText(x,momentText(rec,kind),ix,Y+42,W-P-ix-12,16,2);
      Y+=mh+10;});
    Y+=GAP-10;
  }
  // top seleções
  if(teams.length){secTitle("Seleções que mais te deram pontos");
    teams.forEach((t,i)=>{const ty=Y+i*40,cy=ty+17;tile(P,ty,CW,34,9);
      drawFlag(x,F(t.id),P+12,ty+8,26,18);
      x.textAlign="left";x.font="600 15px Inter,Arial,sans-serif";x.fillStyle="#EAF0F6";x.fillText(nm(t.id),P+48,cy+5);
      x.textAlign="right";x.font="800 18px 'Barlow Condensed',sans-serif";x.fillStyle="#E6B450";x.fillText(String(t.pt),W-P-12,cy+6);});
    Y+=hTeams+GAP;
  }
  cvFooter(x,W,H,"Perfil · Bolão 015 · Copa 2026");
  return cv;
}

function stakeChipsHTML(s,id,isHome){
  const v=isHome?s.acc[id].H:s.acc[id].A,e=s.acc[id].D,d=isHome?s.acc[id].A:s.acc[id].H;

// ---- modal de prévia: builder pode ser canvas ou função (sync/async) que devolve canvas ----
let _shBlob=null,_shName="bolao-015.png";
async function openShareModal(builder,filename,title){
  const m=document.getElementById("shmodal");if(!m)return;
  document.getElementById("shtitle").textContent=title||"Compartilhar";
  document.getElementById("shicon").innerHTML=ICONS.share||"";
  _shName=filename||"bolao-015.png";
  const wrap=document.querySelector(".shimgwrap"),img=document.getElementById("shimg");
  const sb=document.getElementById("shshare"),dl=document.getElementById("shdl");
  _shBlob=null;img.removeAttribute("src");sb.style.display="none";dl.disabled=true;
  wrap.classList.add("loading");m.classList.add("open");m.setAttribute("aria-hidden","false");
  let cv=null;
  try{cv=typeof builder==="function"?await builder():builder;}catch(e){cv=null;}
  if(!cv){wrap.classList.remove("loading");return;}
  cv.toBlob(blob=>{
    wrap.classList.remove("loading");
    if(!blob)return;_shBlob=blob;dl.disabled=false;
    if(img._u)URL.revokeObjectURL(img._u);
    img._u=URL.createObjectURL(blob);img.src=img._u;
    let canFiles=false;try{canFiles=!!(navigator.canShare&&navigator.canShare({files:[new File([blob],_shName,{type:"image/png"})]}));}catch(e){}
    sb.style.display=canFiles?"":"none";
    dl.style.flex=canFiles?"1":"1 1 100%";
  },"image/png");
}
function closeShareModal(){const m=document.getElementById("shmodal");if(!m)return;m.classList.remove("open");m.setAttribute("aria-hidden","true");}
async function doShareBlob(){
  if(!_shBlob)return;
  try{const file=new File([_shBlob],_shName,{type:"image/png"});
    if(navigator.canShare&&navigator.canShare({files:[file]}))
      await navigator.share({files:[file]}); // só a imagem, sem texto/legenda automática
  }catch(e){}
}
function doDownloadBlob(){
  if(!_shBlob)return;const url=URL.createObjectURL(_shBlob);
  const a=document.createElement("a");a.href=url;a.download=_shName;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}
function shareRanking(){openShareModal(makeShareCanvas,"bolao-015-geral.png","Classificação geral");}

/* ===================== PULL-TO-REFRESH (mobile) ===================== */
(function(){
  const TH=68;let y0=0,on=false,armed=false,busy=false;
  const el=()=>document.getElementById("ptr");
  document.addEventListener("touchstart",e=>{if(!busy&&window.scrollY<=0&&e.touches.length===1){y0=e.touches[0].clientY;on=true;armed=false;}},{passive:true});
  document.addEventListener("touchmove",e=>{if(!on)return;const p=el();const dy=e.touches[0].clientY-y0;
    if(dy<=0||window.scrollY>0){on=false;if(p){p.style.transform="";p.style.opacity="";}return;}
    const d=Math.min(dy*0.55,92);
    if(p){p.style.transform="translateY("+d+"px)";p.style.opacity=String(Math.min(1,d/TH));
      const ic=p.querySelector(".ic");if(ic)ic.style.transform="rotate("+(d*4)+"deg)";}
    armed=d>=TH-6;if(dy>6&&e.cancelable)e.preventDefault();},{passive:false});
  document.addEventListener("touchend",()=>{if(!on)return;on=false;const p=el();if(!p)return;
    if(armed){busy=true;const ic=p.querySelector(".ic");if(ic)ic.style.transform="";
      p.classList.add("spin");p.style.transform="translateY(56px)";p.style.opacity="1";
      Promise.resolve(tick(false)).finally(()=>{setTimeout(()=>{p.classList.remove("spin");p.style.transform="";p.style.opacity="";busy=false;},260);});}
    else{p.style.transform="";p.style.opacity="";}},{passive:true});
})();

/* ============================================================
   FERRAMENTA TEMPORÁRIA — preenchimento retroativo de palpites
   Abrir: acrescente #preencher no fim da URL (pede a senha ADMIN_PW).
   Escolha o jogador no topo e vá digitando. Tab pula de campo e, no
   2º placar, pula pro próximo jogo (Enter faz o mesmo). Salva na hora
   (local + Supabase). Para REMOVER: apague todo este bloco.
   ============================================================ */
let _fillPlayer=PLAYERS[0], _fillPollTimer=null;
function fillGamesSorted(){ return GAMES.slice().sort((a,b)=>(kickParts(a).ts-kickParts(b).ts)||((+a.id)-(+b.id))); }
function fillTeamName(id,label){ const n=tmName(+id); return (n&&n!=="—")?n:(label||"—"); }
function fillCount(){ const p=_fillPlayer; let n=0; GAMES.forEach(g=>{ const x=(GUESS[g.id]||{})[p]; if(x&&x.a!==""&&x.a!=null&&x.b!==""&&x.b!=null)n++; }); return n; }
function updCount(){ const el=document.getElementById("ftCount"); if(el)el.textContent="Jogador: "+_fillPlayer+" — "+fillCount()+" jogo(s) com os dois placares"; }
function markDone(row,ia,ib){ row.classList.toggle("done",ia.value!==""&&ib.value!==""); }
function fillEsc(e){ if(e.key==="Escape")closeFillTool(); }
function fillKey(e){ if(e.key==="Enter"){ e.preventDefault(); const all=[...document.querySelectorAll("#ftBody .ft-inp")]; const i=all.indexOf(e.target); if(i>=0&&i+1<all.length){ all[i+1].focus(); all[i+1].select(); } } }
function openFillTool(){
  if(document.getElementById("fillTool"))return;
  const pw=prompt("Senha para preencher palpites:");
  if(pw==null){ closeFillTool(); return; }
  if(pw!==ADMIN_PW){ alert("Senha incorreta."); closeFillTool(); return; }
  if(!document.getElementById("fillCss")){
    const st=document.createElement("style"); st.id="fillCss";
    st.textContent=`#fillTool{position:fixed;inset:0;z-index:5000;background:#0b0f14;color:#eaf0f6;display:flex;flex-direction:column;font-family:Inter,system-ui,sans-serif}
    #fillTool .ft-head{position:sticky;top:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 12px;background:#121a24;border-bottom:1px solid #223}
    #fillTool h2{font-size:16px;margin:0;font-weight:800}
    #fillTool select{font:inherit;font-size:16px;padding:6px 8px;background:#0b0f14;color:#eaf0f6;border:1px solid #2a3a4a;border-radius:8px}
    #fillTool .ft-count{font-size:13px;color:#8aa1b5}
    #fillTool .ft-hint{font-size:12px;color:#5c6b7a}
    #fillTool .ft-x{margin-left:auto;background:#22303c;color:#eaf0f6;border:0;border-radius:8px;padding:8px 14px;font:inherit;font-weight:700;cursor:pointer}
    #fillTool .ft-body{flex:1;overflow:auto;padding:6px 10px 90px}
    #fillTool .ft-row{display:flex;align-items:center;gap:8px;padding:5px 4px;border-bottom:1px solid #18222c}
    #fillTool .ft-row.done{background:rgba(31,181,122,.06)}
    #fillTool .ft-idx{width:36px;color:#4d5c6b;font-size:11px;text-align:right;flex:none}
    #fillTool .ft-date{width:44px;color:#6f8092;font-size:11px;flex:none}
    #fillTool .ft-teams{flex:1;min-width:0;display:flex;align-items:center;gap:6px;font-size:14px}
    #fillTool .ft-teams img{width:22px;height:15px;object-fit:cover;border-radius:2px;flex:none;box-shadow:0 0 0 1px #223}
    #fillTool .ft-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #fillTool .ft-sep{color:#4d5c6b;flex:none}
    #fillTool .ft-res{width:44px;text-align:center;color:#5c6b7a;font-size:12px;flex:none}
    #fillTool .ft-inp{width:46px;height:42px;text-align:center;font-size:19px;font-weight:700;background:#0e1620;color:#fff;border:1px solid #2a3a4a;border-radius:8px;-moz-appearance:textfield}
    #fillTool .ft-inp::-webkit-outer-spin-button,#fillTool .ft-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    #fillTool .ft-inp:focus{border-color:#1FB57A;outline:none;background:#0e2018}`;
    document.head.appendChild(st);
  }
  const ov=document.createElement("div"); ov.id="fillTool";
  const head=document.createElement("div"); head.className="ft-head";
  const h2=document.createElement("h2"); h2.textContent="Preencher palpites";
  const sel=document.createElement("select");
  PLAYERS.forEach(pl=>{ const o=document.createElement("option"); o.value=pl; o.textContent=pl; sel.appendChild(o); });
  sel.value=_fillPlayer; sel.onchange=()=>{ _fillPlayer=sel.value; renderFillList(); };
  const count=document.createElement("span"); count.className="ft-count"; count.id="ftCount";
  const hint=document.createElement("span"); hint.className="ft-hint"; hint.textContent="Tab/Enter: próximo campo · salva sozinho";
  const x=document.createElement("button"); x.className="ft-x"; x.type="button"; x.textContent="Fechar"; x.onclick=closeFillTool;
  head.append(h2,sel,count,hint,x);
  const body=document.createElement("div"); body.className="ft-body"; body.id="ftBody";
  ov.append(head,body); document.body.appendChild(ov);
  document.addEventListener("keydown",fillEsc);
  renderFillList();
}
function closeFillTool(){
  const ov=document.getElementById("fillTool"); if(ov)ov.remove();
  document.removeEventListener("keydown",fillEsc);
  if(_fillPollTimer){ clearTimeout(_fillPollTimer); _fillPollTimer=null; }
  if(location.hash==="#preencher"){ try{ history.replaceState(null,"",location.pathname+location.search); }catch(e){ location.hash=""; } }
}
function renderFillList(){
  const body=document.getElementById("ftBody"); if(!body)return;
  const games=fillGamesSorted();
  if(!games.length){ body.innerHTML='<div style="padding:20px;color:#8aa1b5">Carregando jogos… (se demorar, atualize a página)</div>'; _fillPollTimer=setTimeout(renderFillList,700); return; }
  body.innerHTML=""; const p=_fillPlayer;
  const mkInp=v=>{ const el=document.createElement("input"); el.className="ft-inp"; el.type="number"; el.min="0"; el.inputMode="numeric"; el.value=(v===0||v)?v:""; el.onkeydown=fillKey; return el; };
  games.forEach(g=>{
    const gx=(GUESS[g.id]||{})[p]||{a:"",b:""};
    const row=document.createElement("div"); row.className="ft-row"+((gx.a!==""&&gx.b!=="")?" done":"");
    const idx=document.createElement("span"); idx.className="ft-idx"; idx.textContent="#"+g.id;
    const date=document.createElement("span"); date.className="ft-date"; date.textContent=kickParts(g).d;
    const teams=document.createElement("span"); teams.className="ft-teams";
    const fa=flag(+g.home_team_id,22),fb=flag(+g.away_team_id,22);
    teams.innerHTML=(fa?`<img src="${fa}">`:"")+`<span class="ft-nm">${fillTeamName(g.home_team_id,g.home_team_label)}</span><span class="ft-sep">×</span><span class="ft-nm">${fillTeamName(g.away_team_id,g.away_team_label)}</span>`+(fb?`<img src="${fb}">`:"");
    const ia=mkInp(gx.a),sep=document.createElement("span"); sep.className="ft-sep"; sep.textContent="×"; const ib=mkInp(gx.b);
    const rescell=document.createElement("span"); rescell.className="ft-res";
    if(classify(g)!=="upcoming"){ const r=res(g); rescell.textContent=r[0]+"-"+r[1]; }
    ia.oninput=()=>{ setGuess(g.id,p,"a",ia.value); markDone(row,ia,ib); updCount(); };
    ib.oninput=()=>{ setGuess(g.id,p,"b",ib.value); markDone(row,ia,ib); updCount(); };
    row.append(idx,date,teams,ia,sep,ib,rescell); body.appendChild(row);
  });
  updCount();
  const cur=document.activeElement, inList=cur&&cur.classList&&cur.classList.contains("ft-inp");
  if(!inList){ const f=body.querySelector(".ft-inp"); if(f)f.focus(); }
}
function maybeOpenFillTool(){ if(location.hash==="#preencher")openFillTool(); }
window.addEventListener("hashchange",maybeOpenFillTool);
maybeOpenFillTool();
