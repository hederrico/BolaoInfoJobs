<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão 015 · Copa 2026 ao vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14;--panel:#141A22;--panel-2:#101720;--line:rgba(255,255,255,.07);--line-2:rgba(255,255,255,.13);
    --ink:#EAF0F6;--muted:#8A98A8;--muted-2:#5d6b7a;
    --green:#1FB57A;--gold:#E6B450;--live:#FF4D5E;--zero:#6B7785;
    --radius:12px;--display:"Barlow Condensed","Arial Narrow",system-ui,sans-serif;--body:"Inter",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  /* scrollbar estilizada (mesma do perfil) em toda a página */
  html{scrollbar-width:thin;scrollbar-color:var(--line-2) transparent}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted-2);background-clip:padding-box}
  body{font-family:var(--body);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
    background:radial-gradient(1200px 600px at 18% -10%,#16202c 0%,transparent 60%),radial-gradient(1000px 500px at 100% 0%,#121a24 0%,transparent 55%),var(--bg);}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 16px 70px}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand .mark{font-family:var(--display);font-weight:800;font-size:29px;letter-spacing:.02em;line-height:1}
  .brand .mark b{color:var(--green)}
  .brand .tag{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .rules{display:flex;gap:7px;flex-wrap:wrap}
  .rule{font-size:11.5px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);padding:5px 10px;border-radius:999px;display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}.dot.g{background:var(--green)}.dot.y{background:var(--gold)}.dot.z{background:var(--zero)}

  .statusbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 2px 18px;font-size:12.5px;color:var(--muted)}
  .conn{display:inline-flex;align-items:center;gap:8px;font-weight:600}
  .heart{width:9px;height:9px;border-radius:50%;background:var(--muted-2)}
  .conn.ok .heart{background:var(--green)}
  .conn.live .heart{background:var(--live);animation:beat 1.15s ease-in-out infinite}
  .conn.off .heart{background:var(--live)}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(255,77,94,.5)}70%{box-shadow:0 0 0 7px rgba(255,77,94,0)}100%{box-shadow:0 0 0 0 rgba(255,77,94,0)}}
  @media (prefers-reduced-motion:reduce){.conn.live .heart{animation:none}}
  .statusbar .sep{color:var(--muted-2)}
  .statusbar button{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;cursor:pointer}
  .statusbar button:hover{border-color:var(--line-2)}

  .sectitle{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    margin:24px 4px 12px;display:flex;align-items:center;gap:9px}
  .sectitle .pulse{width:8px;height:8px;border-radius:50%;background:var(--live);animation:beat 1.15s infinite}
  .sectitle:first-of-type{margin-top:6px}

  /* game card */
  .card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:16px;position:relative}
  .chead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .meta{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    padding:5px 11px;border-radius:999px;border:1px solid var(--line)}
  .chip.live{color:var(--live);border-color:rgba(255,77,94,.35);background:rgba(255,77,94,.08)}
  .chip.live .hb{width:8px;height:8px;border-radius:50%;background:var(--live);animation:beat 1.15s infinite}
  .chip.done{color:var(--green);border-color:rgba(31,181,122,.35);background:rgba(31,181,122,.08)}
  .chip.soon{color:var(--gold);border-color:rgba(230,180,80,.3);background:rgba(230,180,80,.07)}

  .scoreline{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .team{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
  .team img{width:66px;height:50px;border-radius:7px;object-fit:cover;background:var(--panel-2);box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .team .nm{font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:.02em;text-align:center;line-height:1.05}
  .bigscore{font-family:var(--display);font-weight:800;font-size:50px;line-height:1;letter-spacing:.02em;white-space:nowrap}
  .bigscore .s{color:var(--ink)}.bigscore .x{color:var(--muted-2);margin:0 8px;font-size:34px;vertical-align:6px}
  .kickoff{font-family:var(--display);font-weight:700;font-size:26px;color:var(--muted);white-space:nowrap;text-align:center}
  .kickoff small{display:block;font-family:var(--body);font-size:10.5px;letter-spacing:.06em;color:var(--muted-2);font-weight:600;margin-top:3px}

  .body2{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-top:16px}
  @media (max-width:720px){.body2{grid-template-columns:1fr}.team img{width:52px;height:40px}.team .nm{font-size:17px}.bigscore{font-size:40px}}
  .sub{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);font-weight:700;margin:0 0 9px}

  .guesses{display:flex;flex-direction:column;gap:5px}
  .guess{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;background:var(--panel-2)}
  .guess .who{flex:1;font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ginp{width:34px;height:34px;text-align:center;font-family:var(--display);font-weight:700;font-size:19px;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:0;-moz-appearance:textfield}
  .ginp::-webkit-outer-spin-button,.ginp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .ginp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(230,180,80,.16)}
  .gsep{color:var(--muted-2);font-family:var(--display);font-size:15px}

  .rank{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px;margin-bottom:5px;background:var(--panel-2);border:1px solid transparent}
  .rank .pos{font-family:var(--display);font-weight:700;font-size:14px;color:var(--muted-2);width:16px;text-align:center}
  .rank .who{flex:1;font-weight:600;font-size:13.5px}
  .move{font-size:10.5px;font-weight:700;letter-spacing:.01em;margin-right:3px;opacity:.9}
  .move.up{color:var(--green)}
  .move.down{color:#E06A73}
  .move.flat{color:var(--muted-2);font-weight:600;opacity:.6}
  .rank .badge{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:999px;color:var(--muted)}
  .rank .pts{font-family:var(--display);font-weight:800;font-size:20px;width:34px;text-align:right;color:var(--ink)}
  .rank.cravou{border-color:rgba(31,181,122,.4)}.rank.cravou .badge{color:var(--green);background:rgba(31,181,122,.12)}.rank.cravou .pts{color:var(--green)}
  .rank.vencedor .badge{color:var(--gold);background:rgba(230,180,80,.12)}.rank.vencedor .pts{color:var(--gold)}
  .rank.errou .badge{color:var(--zero);background:rgba(107,119,133,.1)}.rank.errou .pts{color:var(--zero)}
  .rank.pend .badge{color:var(--muted-2)}.rank.pend .pts{color:var(--muted-2)}
  .rank.leader{box-shadow:0 0 0 1px rgba(230,180,80,.5)}.rank.leader .pos{color:var(--gold)}
  .rank{cursor:pointer;transition:border-color .15s,background .15s}
  .rank:hover{border-color:var(--line-2);background:#161d27}
  .avt{display:inline-flex;align-items:center;justify-content:center;flex:none;line-height:0}
  .avt svg{display:block;border-radius:50%}
  .urow .who,.guess .who{display:flex;align-items:center;gap:7px;cursor:pointer}
  .urow .who .wn,.guess .who .wn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}

  /* linha unificada: palpite + pontos numa coisa só */
  .ulist{display:flex;flex-direction:column;gap:5px}
  .urow{display:grid;grid-template-columns:16px minmax(40px,1fr) auto 94px 38px;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;background:var(--panel-2);border:1px solid transparent}
  .urow .pos{font-family:var(--display);font-weight:700;font-size:14px;color:var(--muted-2);text-align:center}
  .urow .who{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .urow .inp{display:flex;align-items:center;gap:5px}
  .urow .badge{justify-self:start;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:999px;color:var(--muted);white-space:nowrap}
  .urow .pts{font-family:var(--display);font-weight:800;font-size:20px;text-align:right;color:var(--ink)}
  .urow.cravou{border-color:rgba(31,181,122,.4)}.urow.cravou .badge{color:var(--green);background:rgba(31,181,122,.12)}.urow.cravou .pts{color:var(--green)}
  .urow.vencedor .badge{color:var(--gold);background:rgba(230,180,80,.12)}.urow.vencedor .pts{color:var(--gold)}
  .urow.errou .badge{color:var(--zero);background:rgba(107,119,133,.1)}.urow.errou .pts{color:var(--zero)}
  .urow.pend .badge{color:var(--muted-2)}.urow.pend .pts{color:var(--muted-2)}
  .urow.leader{box-shadow:0 0 0 1px rgba(230,180,80,.5)}.urow.leader .pos{color:var(--gold)}
  @media (max-width:480px){.urow{grid-template-columns:16px minmax(40px,1fr) auto 34px}.urow .badge{display:none}.urow .ginp{width:31px;height:31px;font-size:17px}}

  /* upcoming compact */
  .soonrow{display:flex;align-items:center;gap:12px;cursor:pointer}
  .soonrow .clock{display:inline-flex;color:var(--muted-2)}
  .soonrow .vs{flex:1;display:flex;align-items:center;gap:9px;min-width:0;flex-wrap:wrap}
  .soonrow .vs img{width:30px;height:22px;border-radius:4px;object-fit:cover}
  .soonrow .vs .t{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:.02em}
  .soonrow .vs .mid{color:var(--muted-2);font-family:var(--display);font-size:14px}
  .soonrow .when{font-family:var(--display);font-weight:700;font-size:18px;color:var(--gold);text-align:right;white-space:nowrap}
  .soonrow .when small{display:block;font-family:var(--body);font-size:10px;color:var(--muted-2);font-weight:600;letter-spacing:.05em}
  .soonrow .caret{color:var(--muted-2);font-size:12px;transition:.2s}
  .card.open .soonrow .caret{transform:rotate(180deg)}
  .soonrow .rowshare{width:28px;height:28px;border-radius:8px;flex:none}
  .soonrow .rowshare .ic{width:13px;height:13px}
  .soonrow .watchbtn{width:28px;height:28px;border-radius:8px;flex:none}
  .soonrow .watchbtn .ic{width:13px;height:13px}
  .watchbtn{color:var(--green);border-color:rgba(31,181,122,.42);text-decoration:none}
  .watchbtn:hover{color:var(--green);background:rgba(31,181,122,.12);border-color:rgba(31,181,122,.6)}
  .soonbody{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .card.open .soonbody{display:block}

  /* histórico (partidas encerradas) */
  .soonrow .vs .res{font-family:var(--display);font-weight:800;font-size:21px;color:var(--ink);letter-spacing:.02em;padding:0 4px;white-space:nowrap}
  .soonrow .when.past{color:var(--muted)}
  .urow .scorestat{font-family:var(--display);font-weight:700;font-size:18px;color:var(--ink);text-align:center;white-space:nowrap}
  .urow .scorestat.none{color:var(--muted-2);font-size:12px;font-family:var(--body);font-weight:600;letter-spacing:.04em;text-transform:uppercase}

  /* cabeçalho de dia no histórico */
  .dayhead{display:flex;align-items:center;gap:10px;margin:20px 4px 11px}
  .dayhead .dl{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
  .dayhead .dc{font-size:11px;color:var(--muted-2);font-weight:600;white-space:nowrap}
  .dayhead::after{content:"";flex:1;height:1px;background:var(--line)}
  /* modo edição do histórico (trava por senha) */
  .sectitle .cardshare.histlock.on{color:var(--gold);border-color:rgba(230,180,80,.5);background:rgba(230,180,80,.12)}
  .editbanner{display:flex;align-items:center;gap:11px;margin:0 2px 16px;padding:11px 13px;border-radius:var(--radius);
    background:rgba(230,180,80,.08);border:1px solid rgba(230,180,80,.32)}
  .editbanner>.ic{width:16px;height:16px;flex:none;color:var(--gold)}
  .editbanner span{flex:1;font-size:12.5px;color:var(--muted);font-weight:500;line-height:1.35}
  .editbanner span b{color:var(--gold)}
  .editbanner .eb-off{flex:none;background:var(--panel-2);border:1px solid var(--line-2);color:var(--ink);font:inherit;font-weight:700;font-size:12px;padding:6px 13px;border-radius:999px;cursor:pointer}
  .editbanner .eb-off:hover{border-color:var(--muted-2)}
  .card.editing.needfill{border-color:rgba(230,180,80,.42);box-shadow:0 0 0 1px rgba(230,180,80,.12)}
  .card.editing.needfill .res{color:var(--gold)}
  .geral .rank .pts{color:var(--ink)}
  .empty{color:var(--muted-2);font-size:13.5px;text-align:center;padding:26px 14px;background:var(--panel-2);border:1px dashed var(--line);border-radius:var(--radius)}
  .empty b{color:var(--ink)}
  footer{margin-top:30px;text-align:center;color:var(--muted-2);font-size:11.5px;line-height:1.7}
  footer code{color:var(--muted)}
  input,button{font-family:inherit}::selection{background:rgba(31,181,122,.3)}

  /* ===== loading (futebol) ===== */
  .loader{position:fixed;inset:0;z-index:120;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
    background:radial-gradient(900px 520px at 50% 28%,#16202c 0%,transparent 60%),var(--bg);transition:opacity .45s ease}
  .loader.hide{opacity:0;pointer-events:none}
  .field{position:relative;width:150px;height:140px}
  .field::before{content:"";position:absolute;left:50%;top:14px;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;
    border:2px solid var(--line-2);opacity:.45;background:repeating-conic-gradient(from 0deg,transparent 0 22deg,rgba(255,255,255,.018) 22deg 44deg)}
  .ball{position:absolute;left:50%;bottom:30px;width:56px;height:56px;display:block;transform:translateX(-50%);
    animation:kick 1.15s cubic-bezier(.5,.05,.5,.95) infinite;filter:drop-shadow(0 6px 6px rgba(0,0,0,.45))}
  .bshadow{position:absolute;left:50%;bottom:22px;width:52px;height:12px;border-radius:50%;background:rgba(0,0,0,.5);
    transform:translateX(-50%);filter:blur(3px);animation:bsh 1.15s cubic-bezier(.5,.05,.5,.95) infinite}
  @keyframes kick{0%,100%{bottom:30px;transform:translateX(-50%) rotate(0)}50%{bottom:96px;transform:translateX(-50%) rotate(210deg)}}
  @keyframes bsh{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.5}50%{transform:translateX(-50%) scaleX(.5);opacity:.16}}
  @media (prefers-reduced-motion:reduce){.ball,.bshadow{animation:none}}
  .ltxt{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
  .ltxt .dots i{font-style:normal;animation:blink 1.4s infinite;opacity:.2}
  .ltxt .dots i:nth-child(2){animation-delay:.2s}.ltxt .dots i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

  /* ===== abas ===== */
  .tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:2px 0 20px}
  .tabs button:last-child:nth-child(odd){grid-column:1 / -1}
  @media(min-width:560px){.tabs{grid-template-columns:repeat(6,1fr)}.tabs button:last-child:nth-child(odd){grid-column:auto}}
  .tabs button{justify-content:center;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font:inherit;font-weight:700;
    font-size:12.5px;padding:10px 8px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .tabs button:hover{border-color:var(--line-2);color:var(--ink)}
  .tabs button.active{color:var(--ink);border-color:rgba(31,181,122,.5);background:linear-gradient(180deg,#1a232e,#121922);box-shadow:0 0 0 1px rgba(31,181,122,.18)}
  /* ícones svg inline */
  .ic{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;vertical-align:-2px}
  .ic svg{width:100%;height:100%;display:block}
  .sectitle .ic{width:16px;height:16px;color:var(--muted)}
  .sectitle .pulse+.ic{margin-left:0}

  /* ===== preview do chaveamento embutido no card (mata-mata) ===== */
  .kobrk{margin-top:12px;border:1px solid var(--line);border-radius:12px;padding:11px 12px 12px;background:rgba(255,255,255,.02)}
  .kobrk-cap{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);line-height:1.3;margin-bottom:11px}
  .kobrk-cap .ic{color:var(--gold);flex:none}
  .kobrk-cap b{color:var(--ink);font-weight:800}
  .kobrk-grid{display:grid;grid-template-columns:minmax(0,1fr) 26px minmax(0,1fr);align-items:stretch}
  .kobrk-left{display:grid;grid-template-rows:1fr 1fr;gap:10px;min-width:0}
  .kobrk-conn{position:relative}
  .kobrk-conn svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .kobrk-conn svg path{stroke:var(--line-2);stroke-width:1.6}
  .kobrk-next{display:flex;align-items:center;min-width:0}
  .kcard{min-width:0;width:100%;border:1px solid var(--line);border-radius:10px;background:var(--panel-2);padding:7px 8px;display:flex;flex-direction:column;gap:5px}
  .kcard.is-this{border-color:rgba(31,181,122,.5);background:rgba(31,181,122,.07);box-shadow:0 0 0 1px rgba(31,181,122,.18) inset}
  .kcard.is-next{border-style:dashed;background:rgba(230,180,80,.05);border-color:rgba(230,180,80,.32)}
  .kc-h{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .kc-t{flex:1;min-width:0;font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kcard.is-this .kc-t{color:var(--green)}
  .kcard.is-next .kc-t{color:var(--gold)}
  .kc-lv{font-size:10px;font-weight:800;color:var(--live);white-space:nowrap;flex:none}
  .kc-fin{font-size:10px;font-weight:700;color:var(--muted-2);white-space:nowrap;flex:none}
  .kc-soon{font-size:10px;font-weight:800;color:var(--muted);white-space:nowrap;flex:none}
  .kt{display:flex;align-items:center;gap:6px;min-width:0}
  .kt-fl{flex:none;width:22px;height:16px;display:inline-grid;place-items:center}
  .kt-fl img{width:22px;height:16px;object-fit:cover;border-radius:3px;display:block}
  .kt .ktf{display:inline-grid;place-items:center;width:16px;height:16px;color:var(--muted-2)}
  .kt .ktf svg{width:14px;height:14px}
  .kt-n{flex:1;min-width:0;font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kt-sc{flex:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--ink)}
  .kt.win .kt-n{color:var(--ink)}
  .kt.lose{opacity:.5}
  .kt.tbd .kt-n{color:var(--muted-2);font-weight:600;font-style:italic}

  /* ===== classificação dos grupos ===== */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:14px}
  .gcard{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 11px}
  .ghead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .ghead .gname{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:.05em}
  .ghr{display:inline-flex;align-items:center;gap:8px}
  .ghead .cardshare,.shead .cardshare{width:26px;height:26px;border-radius:8px}
  .ghead .cardshare .ic,.shead .cardshare .ic{width:13px;height:13px}
  .gtable{width:100%;border-collapse:collapse;font-size:13px}
  .gtable th{font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-2);font-weight:700;padding:3px 3px 7px;text-align:center}
  .gtable th.l{text-align:left;padding-left:32px}
  .gtable td{padding:7px 3px;text-align:center;border-top:1px solid var(--line);color:var(--muted)}
  .gtable td.tm{text-align:left;font-weight:600;color:var(--ink);white-space:nowrap}
  .gtable td.tm .fx{display:inline-flex;align-items:center;gap:7px;max-width:100%;min-width:0}
  .gtable td.tm .nmt{overflow:hidden;text-overflow:ellipsis;min-width:0}
  .gtable td.tm img{width:26px;height:19px;border-radius:3px;object-fit:cover;flex:0 0 auto}
  .gtable td.tm .nmt{overflow:hidden;text-overflow:ellipsis}
  .gtable .pos{font-family:var(--display);font-weight:700;color:var(--muted-2);width:22px;position:relative}
  .gtable .pos::before{content:"";position:absolute;left:-9px;top:50%;transform:translateY(-50%);width:4px;height:20px;border-radius:3px;background:transparent}
  .gtable tr.q1 .pos::before{background:var(--green)}
  .gtable tr.q3 .pos::before{background:var(--gold)}
  .gtable tr.q4 .pos::before{background:var(--zero)}
  .gtable .gd{font-weight:700}
  .gtable .pts{font-family:var(--display);font-weight:800;font-size:16px;color:var(--ink)}
  .glegend{display:flex;gap:13px;flex-wrap:wrap;margin-top:10px;font-size:10.5px;color:var(--muted-2)}
  .glegend span{display:inline-flex;align-items:center;gap:5px}
  .glegend i{width:9px;height:9px;border-radius:2px;display:inline-block}

  /* ===== mata-mata (chaveamento horizontal conectado) ===== */
  .bkhint{font-size:11.5px;color:var(--muted-2);margin:0 2px 13px;display:flex;align-items:center;gap:7px;line-height:1.4}
  .bkhint .ic{flex:0 0 auto;color:var(--muted-2)}
  .bkscroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:12px}
  .bk{position:relative;display:flex;align-items:stretch;width:max-content;min-width:100%}
  .bkcol{display:flex;flex-direction:column;flex:0 0 198px;padding-right:30px}
  .bkcol:last-child{padding-right:0}
  .bkch{font-family:var(--display);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-size:12px;
    text-align:center;padding:7px;margin-bottom:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px}
  .bklist{flex:1;display:flex;flex-direction:column;justify-content:space-around}
  .bklist .match{width:100%;position:relative;z-index:1;margin:5px 0}
  .bklines{position:absolute;top:0;left:0;pointer-events:none;z-index:0}
  .bkline{fill:none;stroke:var(--line-2);stroke-width:2;stroke-linejoin:round}
  .match{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:9px;padding:8px 9px}
  .match.fin{border-color:rgba(230,180,80,.45);box-shadow:0 0 0 1px rgba(230,180,80,.14)}
  .mh{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:5px}
  .mh .mn{font-family:var(--display);font-weight:700;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-2)}
  .mh .mw{font-size:10px;color:var(--muted-2);white-space:nowrap}
  .mh .mw .lv{color:var(--live);font-weight:700}
  .mt{display:flex;align-items:center;gap:8px;padding:4px 1px}
  .mt+.mt{border-top:1px solid var(--line)}
  .mt img,.mt .tbf{width:26px;height:19px;border-radius:3px;object-fit:cover;flex:0 0 auto}
  .mt .tbf{background:repeating-linear-gradient(45deg,#19212b,#19212b 4px,#222c37 4px,#222c37 8px);display:grid;place-items:center;color:var(--muted-2)}
  .mt .tbf svg{width:12px;height:12px}
  .mt .tn{flex:1;font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .mt.tbd .tn{color:var(--muted);font-weight:500;font-size:11.5px}
  .mt .sc{font-family:var(--display);font-weight:800;font-size:16px;color:var(--ink)}
  .mt.lose{opacity:.5}
  .mt.win .tn{color:var(--green)}
  .bkthird{margin-top:22px;max-width:240px}
  .bkthd{font-family:var(--display);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-size:12px;margin:0 2px 9px}
  .konote{font-size:11.5px;color:var(--muted-2);line-height:1.55;margin-top:16px}

  /* ===== cenários (mobile-first, só bandeira) ===== */
  .scard{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:13px;margin-bottom:14px}
  .scard .shead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .scard .gname{font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:.05em}
  .scn{overflow-x:hidden}
  .scntab{border-collapse:separate;border-spacing:3px;width:100%;table-layout:fixed}
  .scntab th{font-family:var(--display);font-weight:700;letter-spacing:.02em;text-transform:uppercase;font-size:10.5px;color:#fff;
    padding:6px 1px;border-radius:7px;text-align:center}
  .scntab th.fix,.scntab td.out{width:13%}
  .scntab th.p1,.scntab th.p2,.scntab th.p3,.scntab th.p4,.scntab td.pcell{width:18.5%}
  .scntab th.p1,.scntab th.p2{background:#15412f}
  .scntab th.p3{background:#1f3aa6}
  .scntab th.p4{background:#a61f2b}
  .scntab th.fix{background:#0c1219;border:1px solid var(--line);padding:4px 1px}
  .scntab th.fix .fpair{display:inline-flex;align-items:center;gap:2px;justify-content:center;color:var(--muted-2);font-size:9px}
  .scntab th.fix img{width:14px;height:10px;border-radius:2px;object-fit:cover}
  .scntab td{padding:5px 1px;border-radius:7px;text-align:center;background:var(--panel-2);vertical-align:middle}
  .scntab td.out img{width:19px;height:14px;border-radius:2px;object-fit:cover;display:inline-block}
  .scntab td.win{background:#1c5b40}
  .scntab td.draw{background:#10161d}
  .scntab td.draw .eq{color:var(--muted-2);font-weight:800;font-size:13px}
  .scntab td.pcell{background:#0e151d}
  .scntab td.pcell .flags{display:inline-flex;gap:3px;flex-wrap:wrap;justify-content:center}
  .scntab td.pcell img{width:22px;height:16px;border-radius:3px;object-fit:cover}
  /* cenário atual (placar de agora): contorna a linha inteira + fundo diferente */
  .scntab tr.cur{box-shadow:0 0 0 2.5px var(--gold);border-radius:9px}
  .scntab tr.cur td{background:#1c2737}
  .scntab tr.cur td.win{background:#246b4d}
  .scntab tr.cur td.pcell{background:#1a2638}
  .scntab tr.cur td:first-child{border-top-left-radius:8px;border-bottom-left-radius:8px}
  .scntab tr.cur td:last-child{border-top-right-radius:8px;border-bottom-right-radius:8px}
  .aggp img.now{outline:2.5px solid var(--gold);outline-offset:1px}
  .scnlegend{font-size:11.5px;color:var(--muted-2);line-height:1.5;margin:0 2px 14px;display:flex;align-items:flex-start;gap:7px}
  .cur-dot{flex:0 0 auto;width:13px;height:13px;border-radius:4px;border:2px solid var(--gold);margin-top:1px}
  .scn.mini .scntab th{font-size:9px;padding:4px 1px}
  .scn.mini .scntab td{padding:3px 1px}
  .scn.mini .scntab td.pcell img{width:17px;height:13px}
  .scn.mini .scntab td.out img,.scn.mini .scntab th.fix img{width:13px;height:10px}
  .sfinal{display:flex;flex-direction:column;gap:7px}
  .sfrow{display:grid;grid-template-columns:30px 36px 1fr auto;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--panel-2)}
  .sfrow img{width:34px;height:24px;border-radius:3px;object-fit:cover}
  .sfrow .p{font-family:var(--display);font-weight:700;color:var(--muted-2)}
  .sfrow .n{font-weight:600}
  .sfrow .pt{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .sfrow.q1 .pt{color:var(--green)}
  .sfrow.q3 .pt{color:var(--gold)}
  .snote{font-size:11.5px;color:var(--muted-2);margin-top:11px;line-height:1.55}
  .aggp{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .aggp .ac{background:var(--panel-2);border-radius:10px;padding:10px 6px;text-align:center}
  .aggp .ah{font-family:var(--display);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.06em;margin-bottom:8px;color:var(--muted)}
  .aggp .af{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
  .aggp img{width:24px;height:18px;border-radius:3px;object-fit:cover}
  /* selo "Classificando" (terceiros) + check compacto (tabela do grupo) */
  .qbadge{flex:0 0 auto;display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--gold);
    background:rgba(230,180,80,.14);border:1px solid rgba(230,180,80,.32);padding:2px 6px;border-radius:999px;white-space:nowrap;line-height:1.1}
  .qmark{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
    background:rgba(230,180,80,.16);border:1px solid rgba(230,180,80,.42);color:var(--gold)}
  .qmark .ic{width:9px;height:9px}
  .qmark.ok{background:rgba(31,181,122,.16);border-color:rgba(31,181,122,.46);color:var(--green)}
  .qmark.out{background:rgba(224,106,115,.14);border-color:rgba(224,106,115,.45);color:#E06A73}
  .thirdswrap{max-width:560px}
  .gcard.thirds .gtable td.tm .fx{max-width:none}
  .statleg{display:flex;gap:14px;flex-wrap:wrap;margin:0 2px 16px;font-size:11.5px;color:var(--muted)}
  .statleg>span{display:inline-flex;align-items:center;gap:6px}
  .cardscn{margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .cardscn .scnhd{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--muted);font-weight:600;font-size:12.5px}
  .cardscn .scnhd .caret{margin-left:auto;color:var(--muted-2);font-size:11px;transition:transform .2s}
  .cardscn.open .scnhd .caret{transform:rotate(180deg)}
  .cardscn .scnbody{display:none;margin-top:11px}
  .cardscn.open .scnbody{display:block}
  /* "O que está em jogo" — 1 linha por time, bem compacto */
  .stakes{margin-top:13px;padding-top:11px;border-top:1px solid var(--line)}
  .stakes .sub{margin-bottom:1px}
  .stk-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:nowrap}
  .stk-tm{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12.5px;flex:1 1 auto;min-width:0}
  .stk-tm img{width:20px;height:14px;border-radius:2px;object-fit:cover;flex:none}
  .stk-tm span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stk-chips{display:inline-flex;align-items:center;gap:4px;flex:none}
  .stk{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);padding:2px 7px;border-radius:999px;white-space:nowrap}
  .stk i{font-style:normal;opacity:.7}
  .stk b{font-family:var(--display);font-weight:800;font-size:12px}
  .stk.ok{color:var(--green);border-color:rgba(31,181,122,.4);background:rgba(31,181,122,.08)}
  .stk.mid{color:var(--gold);border-color:rgba(230,180,80,.35);background:rgba(230,180,80,.07)}
  .stk.out{color:#E06A73;border-color:rgba(224,106,115,.35);background:rgba(224,106,115,.07)}
  /* badges "o que está em jogo" sob o nome do time, no placar */
  .team .stkmini{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;margin-top:3px;max-width:100%}
  .team .stkmini .stk{font-size:9px;padding:1px 5px;gap:2px}
  .team .stkmini .stk i{opacity:.65}
  .team .stkmini .stk b{font-size:10.5px}

  /* ===== mini classificação ao vivo (dentro do card) ===== */
  .livestand{margin-top:15px;padding-top:13px;border-top:1px solid var(--line)}
  .lst{width:100%;border-collapse:collapse;font-size:12.5px}
  .lst td{padding:6px 4px;text-align:center;border-top:1px solid var(--line);color:var(--muted)}
  .lst tr:first-child td{border-top:none}
  .lst td.tm{text-align:left;color:var(--ink);font-weight:600}
  .lst td.tm .fx{display:inline-flex;align-items:center;gap:7px}
  .lst img{width:22px;height:16px;border-radius:3px;object-fit:cover}
  .lst .pos{font-family:var(--display);font-weight:700;color:var(--muted-2);width:18px}
  .lst tr.q1 .pos{color:var(--green)}
  .lst tr.q3 .pos{color:var(--gold)}
  .lst .gd{font-weight:700}
  .lst .pts{font-family:var(--display);font-weight:800;font-size:15px;color:var(--ink)}

  /* botão compartilhar */
  .statusbar button.hasic{display:inline-flex;align-items:center;gap:6px}
  .statusbar button.hasic .ic{width:14px;height:14px}
  .statusbar button#share{color:var(--green);border-color:rgba(31,181,122,.4)}
  .statusbar button#share:hover{border-color:rgba(31,181,122,.7)}
  .statusbar button:disabled{opacity:.6;cursor:default}

  /* compartilhar por painel (botão no card) */
  .cheadr{display:inline-flex;align-items:center;gap:9px;flex:none}
  .cardshare{display:inline-flex;align-items:center;justify-content:center;width:29px;height:29px;border-radius:9px;
    border:1px solid var(--line);background:var(--panel-2);color:var(--muted);cursor:pointer;padding:0;flex:none}
  .cardshare:hover{color:var(--green);border-color:rgba(31,181,122,.45)}
  .cardshare .ic{width:14px;height:14px;display:block}
  .cardshare.wide{width:auto;height:auto;padding:8px 13px;gap:6px;font:inherit;font-size:12.5px;font-weight:600;margin-top:13px}
  /* share só com ícone no canto superior direito do painel */
  .sectitle .cardshare{margin-left:auto;width:30px;height:30px}
  .sectitle .cardshare .ic{width:14px;height:14px}
  .card.geral{padding-top:46px}
  .card.geral .gershare{position:absolute;top:12px;right:12px}
  .card.geral .sub{position:absolute;top:17px;left:16px;right:54px;margin:0}
  /* exportar vídeo (corrida) — overlay */
  .vidov{position:fixed;inset:0;z-index:150;background:rgba(4,7,10,.86);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:24px 14px;
    padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom))}
  .vidov.open{display:flex}
  .vidbox{background:var(--panel);border:1px solid var(--line-2);border-radius:12px;width:100%;max-width:420px;padding:22px 20px;text-align:center;box-shadow:0 26px 64px rgba(0,0,0,.6);
    max-height:calc(100vh - 56px);max-height:calc(100dvh - 56px);overflow:auto}
  .vidbox .vt{font-family:var(--display);font-weight:800;font-size:20px;margin-bottom:6px}
  .vidbox .vs{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.5}
  .vidbar{height:8px;border-radius:999px;background:var(--line-2);overflow:hidden;margin-bottom:14px}
  .vidbar i{display:block;height:100%;width:0;background:var(--green);transition:width .2s}
  .vidbox video{width:100%;border-radius:9px;display:none;margin-bottom:14px;background:#000}
  .vidact{display:flex;gap:9px}
  .vidact button{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px;border-radius:10px;
    font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink)}
  .vidact button.prim{background:var(--green);border-color:var(--green);color:#04130d}
  .vidact button .ic{width:15px;height:15px}

  /* modal de prévia do compartilhamento (resolve o problema de altura) */
  .shmodal{position:fixed;inset:0;z-index:130;background:rgba(4,7,10,.84);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:24px 14px;
    padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom))}
  .shmodal.open{display:flex}
  .shbox{background:var(--panel);border:1px solid var(--line-2);border-radius:12px;width:100%;max-width:480px;
    max-height:calc(100vh - 56px);max-height:calc(100dvh - 56px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 26px 64px rgba(0,0,0,.6)}
  .shbox .shhd{display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:14.5px}
  .shbox .shhd .ic{width:17px;height:17px;color:var(--green)}
  .shbox .shhd .x{margin-left:auto;cursor:pointer;color:var(--muted);background:none;border:none;font-size:22px;line-height:1;padding:0 4px}
  .shbox .shhd .x:hover{color:var(--ink)}
  .shimgwrap{overflow:auto;padding:14px;background:var(--bg);flex:1 1 auto;min-height:140px;position:relative;display:flex;justify-content:center;align-items:flex-start}
  .shimgwrap img{width:100%;height:auto;max-width:400px;border-radius:11px;display:block;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .shimgwrap.loading::after{content:"";position:absolute;top:50%;left:50%;width:30px;height:30px;margin:-15px;border-radius:50%;
    border:3px solid var(--line-2);border-top-color:var(--green);animation:ptspin .8s linear infinite}
  .shact{display:flex;gap:9px;padding:13px 16px;border-top:1px solid var(--line)}
  .shact button{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px;border-radius:11px;
    font:inherit;font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink)}
  .shact button:hover{border-color:var(--muted-2)}
  .shact button.prim{background:var(--green);border-color:var(--green);color:#04130d}
  .shact button .ic{width:16px;height:16px}

  /* pull-to-refresh */
  .ptr{position:fixed;top:-54px;left:calc(50% - 22px);z-index:90;width:44px;height:44px;border-radius:50%;
    background:var(--panel);border:1px solid var(--line-2);display:grid;place-items:center;color:var(--green);
    opacity:0;pointer-events:none;box-shadow:0 8px 22px rgba(0,0,0,.45)}
  .ptr .ic{width:22px;height:22px;display:block}
  .ptr.spin .ic{animation:ptspin .8s linear infinite}
  @keyframes ptspin{to{transform:rotate(360deg)}}

  /* ===== Corrida (bar chart race, gol a gol) ===== */
  .racewrap{padding:16px 16px 14px}
  .racehead{margin-bottom:16px;text-align:center;position:relative;padding-top:2px}
  .rh-time{font-family:var(--display);font-weight:700;font-size:12.5px;letter-spacing:.03em;color:var(--muted-2);
    white-space:nowrap;text-align:center;min-height:15px;margin-bottom:5px;padding:0 36px}
  .rc-vidbtn{position:absolute;top:0;right:0;z-index:2}
  .cardshare:disabled{opacity:.5;cursor:default}
  .rh-match{display:flex;align-items:center;justify-content:center;gap:9px;min-height:30px}
  .rh-fl{width:30px;height:21px;border-radius:3px;object-fit:cover;flex:none;background:var(--panel-2)}
  .rh-tn{font-family:var(--display);font-weight:800;font-size:18px;max-width:30vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rh-nh{text-align:right}.rh-na{text-align:left}
  .rh-sc{font-family:var(--display);font-weight:800;font-size:23px;letter-spacing:.02em;display:inline-flex;align-items:baseline;gap:3px}
  .rh-sc i{color:var(--muted-2);font-style:normal;font-size:18px}
  .rh-sc b{color:var(--ink);transition:color .3s}.rh-sc b.hot{color:var(--green)}
  .racehead.startf .rh-sc{font-size:18px;color:var(--muted)}
  .rh-sub{margin-top:7px;font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:10px;min-height:16px}

  .racerow .rr-name{flex:none;width:54px;font-weight:700;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .racerow .rr-bar{flex:1;height:24px;position:relative;min-width:0}

  .rc-slider::-moz-range-thumb{width:18px;height:18px;border:2px solid #0B0F14;border-radius:50%;background:var(--green)}
  .racefoot{margin-top:12px;font-size:11.5px;color:var(--muted-2);text-align:center}

  /* gráfico de linhas + legenda */
  .lcsec{padding:16px}

  /* perfil do jogador (modal) */
  .profmodal{position:fixed;inset:0;z-index:140;background:rgba(4,7,10,.84);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:26px 12px;
    padding-top:max(26px,env(safe-area-inset-top));padding-bottom:max(26px,env(safe-area-inset-bottom))}
  .profbox{background:var(--panel);border:1px solid var(--line-2);border-radius:13px;width:100%;max-width:440px;
    max-height:calc(100vh - 60px);max-height:calc(100dvh - 60px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 26px 64px rgba(0,0,0,.6)}
  .prof-hd{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line);flex:none}
  .prof-id{display:flex;flex-direction:column;gap:2px;min-width:0}
  .prof-name{font-family:var(--display);font-weight:800;font-size:23px;letter-spacing:.02em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prof-rank{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prof-hd .prof-share{margin-left:auto;flex:none}
  .prof-x{margin-left:8px;background:none;border:none;color:var(--muted);font-size:24px;line-height:1;cursor:pointer;padding:0 4px;flex:none}

  .prof-body{overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:16px;
    scrollbar-width:thin;scrollbar-color:var(--line-2) transparent;overscroll-behavior:contain}
  .prof-body::-webkit-scrollbar,.shimgwrap::-webkit-scrollbar{width:8px;height:8px}
  .prof-body::-webkit-scrollbar-track,.shimgwrap::-webkit-scrollbar-track{background:transparent;margin:4px}
  .prof-body::-webkit-scrollbar-thumb,.shimgwrap::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
  .prof-body::-webkit-scrollbar-thumb:hover,.shimgwrap::-webkit-scrollbar-thumb:hover{background:var(--muted-2);background-clip:padding-box}
  .statgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
  .stat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:9px 5px;text-align:center;display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden}
  .stat .st-v{font-family:var(--display);font-weight:800;font-size:18px;color:var(--ink);line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stat .st-l{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.01em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prof-sec{min-width:0}
  .prof-sec .prof-st{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .prof-rr{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
  .rr-box{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:11px;display:flex;flex-direction:column;gap:2px}
  .rr-box span{font-size:13px;font-weight:700;color:var(--ink)}
  .rr-box b{font-family:var(--display);font-size:20px;font-weight:800}
  .rr-box small{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-2)}
  .rr-box.up b{color:var(--green)}.rr-box.dn b{color:#E06A73}
  .prof-teams{display:flex;flex-direction:column;gap:6px}
  .pt-tm{display:flex;align-items:center;gap:9px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:7px 10px}
  .pt-tm img{width:26px;height:18px;border-radius:3px;object-fit:cover;flex:none}
  .pt-tm .pt-n{flex:1;font-weight:600;font-size:13.5px}
  .pt-tm b{font-family:var(--display);font-weight:800;font-size:17px;color:var(--gold)}
  /* Você vs. o bolão */
  .vsb{display:flex;gap:8px}
  .vsb .vb{flex:1;min-width:0;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center;display:flex;flex-direction:column;gap:3px}
  .vsb .vb b{font-family:var(--display);font-weight:800;font-size:21px;color:var(--ink);line-height:1}
  .vsb .vb small{font-size:9px;text-transform:uppercase;letter-spacing:.02em;color:var(--muted)}
  .vsb .vb.delta.up b{color:var(--green)}.vsb .vb.delta.dn b{color:#E06A73}
  /* DNA do palpiteiro */
  .dna{display:flex;flex-direction:column;gap:10px}
  .dna-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px}
  .dna-tile{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;gap:3px;min-width:0}
  .dna-tile .dl,.dna-tend .dl{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600}
  .dna-tile .dv{font-family:var(--display);font-weight:800;font-size:19px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dna-tend{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 11px}
  .dna-tend .dl{display:block;margin-bottom:8px}
  .tendbar{display:flex;height:10px;border-radius:6px;overflow:hidden;background:#0e151d}
  .tendbar i{display:block;height:100%}

  .tendleg{display:flex;justify-content:space-between;gap:6px;margin-top:7px;font-size:10.5px;color:var(--muted)}

  .estilo-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--gold);background:rgba(230,180,80,.12);border:1px solid rgba(230,180,80,.3);padding:3px 10px;border-radius:999px}
  /* Momentos da campanha */
  .moms{display:flex;flex-direction:column;gap:10px}

  .mom-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}

  /* contagem regressiva do próximo jogo */
  .nextcard{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px 18px;text-align:center}

  .nc-match{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px}
  .nc-team{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;max-width:38%}

  .nc-team span{font-family:var(--display);font-weight:700;font-size:16px;text-align:center;line-height:1.05}
  .nc-x{font-family:var(--display);font-size:18px;color:var(--muted-2)}
  .nc-cd{font-family:var(--display);font-weight:800;font-size:40px;letter-spacing:.04em;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums}

  .nc-when{margin-top:10px;font-size:12px;color:var(--muted);font-weight:600}

  /* ===== Estatísticas / Seleções ===== */
  .selwrap,.tpwrap{--selg:var(--green);--sela:#e0868f}
  .selwrap{display:flex;flex-direction:column;gap:16px}
  .scard{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 12px}
  .scard-h{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .scard-h .ic{color:var(--selg);flex:none}
  .scard-h b{font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:.02em}
  .scard-h .sh-sub{font-size:12px;color:var(--muted);font-weight:600}
  .scard-h .cardshare{margin-left:auto}
  .scard-note{font-size:11.5px;color:var(--muted);margin:0 0 9px;line-height:1.4}
  .scard-note b{color:var(--ink)}
  .selempty{color:var(--muted-2);font-size:13px;padding:18px;text-align:center}
  .selnote{color:var(--muted-2);font-size:12px;padding:8px 2px;line-height:1.4}
  .selsub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:14px 0 5px}
  .tlink{cursor:pointer}
  .tlink:hover{text-decoration:underline}
  [data-goteam]{cursor:pointer}
  .rmore{width:100%;margin-top:9px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font:inherit;font-weight:700;font-size:12.5px;padding:9px;border-radius:10px;cursor:pointer}

  .scorer.top .sp{color:var(--gold)}
  .scorer>img{width:28px;height:19px;object-fit:cover;border-radius:3px;box-shadow:0 0 0 1px var(--line);flex:none}
  .scorer .sinfo{flex:1;min-width:0}
  .scorer .sn{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .scorer .stm{font-size:11.5px;color:var(--muted)}
  .scorer .pen{font-size:10.5px;color:var(--muted);font-weight:600;flex:none;white-space:nowrap}
  .scorer .sg{font-family:var(--display);font-weight:800;font-size:22px;color:var(--ink);flex:none;min-width:26px;text-align:right}
  .seltable{width:100%;border-collapse:collapse;font-size:13px}

  .seltable th.l{text-align:left}
  .seltable td{padding:7px 3px;text-align:center;border-top:1px solid var(--line);font-variant-numeric:tabular-nums}

  .seltable .tmc{display:flex;align-items:center;gap:8px;min-width:0}
  .seltable .tmc .sdot{width:8px;height:8px;border-radius:50%;flex:none}

  .seltable .sdot.out{background:#E06A73}
  .seltable .sdot.champ{background:var(--gold)}
  .seltable .tmc img{width:24px;height:16px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px var(--line);flex:none}
  .seltable .tmc .tnm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .seltable .tmc .chev{margin-left:auto;color:var(--muted-2);font-weight:700;flex:none}
  .seltable .pts{font-family:var(--display);font-weight:800;color:var(--ink)}
  .seltable .gd{color:var(--muted)}
  .inswrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin:6px 0}

  /* perfil da seleção (página dedicada) */

  .tp-back{align-self:flex-start;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font:inherit;font-weight:700;font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer}

  .tp-band{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .tp-statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  @media(min-width:640px){.tp-statgrid{grid-template-columns:repeat(6,1fr)}}
  .tp-stat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center}

  .tp-stat span{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.02em}
  .formrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}

  .scard.tp-chartcard{display:flex;flex-direction:column}

  .cmp:last-child{border-bottom:0}
  .cmp .cd{width:44px;font-size:11px;color:var(--muted);flex:none}
  .cmp .cph{flex:1;min-width:0;display:flex;align-items:center;gap:7px}
  .cmp .cph img{width:22px;height:15px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px var(--line);flex:none}
  .cmp .cph>span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}

  .pcmp-hint{font-size:12px;color:var(--muted);text-align:center;padding:12px 4px 2px}
  @media(max-width:560px){
    .pcmpwrap{--pcmp-lw:80px}
    .pcmp-row{gap:4px}
    .pcmp-lbl{font-size:10.5px;padding-left:0}
    .pcmp-v{padding:8px 3px;border-radius:8px}
    .pcmp-v>span{font-size:13px}
    .pcmp-v.txt>span{font-size:10px}
    .pcmp-ph .phn{font-size:14.5px}
    .pcmp-ph .phq{font-size:9px}
  }
</style>
</head>

  const f=t=>Math.max(0,Math.min(255,Math.round(t+(pct/100)*255)));

function mix(h1,h2,t){const a=parseInt(h1.slice(1),16),b=parseInt(h2.slice(1),16);
  const f=(s,e)=>Math.round(s+(e-s)*t);
  return "#"+[f((a>>16)&255,(b>>16)&255),f((a>>8)&255,(b>>8)&255),f(a&255,b&255)].map(v=>v.toString(16).padStart(2,"0")).join("");}

const sgn=x=>x>0?1:x<0?-1:0;
function pts(guess,ra,rb,live){
  if(ra==null||rb==null)return{p:null,k:"pend",l:"—"};            // jogo ainda sem resultado
  const ok=guess&&guess.a!==""&&guess.a!=null&&guess.b!==""&&guess.b!=null;
  if(!ok)return{p:0,k:"errou",l:"sem palpite"};                    // esqueceu de palpitar = 0
  const ga=+guess.a,gb=+guess.b;
  if(ga===ra&&gb===rb)return{p:6,k:"cravou",l:live?"cravando":"cravou"};
  if(sgn(ga-gb)===sgn(ra-rb))return{p:3,k:"vencedor",l:live?"pontuando":"vencedor"};
  return{p:0,k:"errou",l:live?"fora":"errou"};
}
// colocação com empate (1,2,2,4...): atribui .rank a linhas já ordenadas desc
function compRanks(rows,val){let prev=null;rows.forEach((r,i)=>{const v=val(r);if(i===0||v!==prev)r.rank=i+1;else r.rank=rows[i-1].rank;prev=v;});return rows;}

// O feed entrega local_date no FUSO LOCAL DO ESTÁDIO (a Copa cruza 4 fusos: México -6,
// EUA Central -5, Leste -4, Oeste -7). Mapa stadium_id -> offset UTC (verão de 2026, junho/julho):
//  1-3  México (CDMX/Guadalajara/Monterrey, sem horário de verão) = -6
//  4-6  EUA Central (Dallas/Houston/Kansas City, CDT)             = -5
//  7-12 Leste (Atlanta/Miami/Boston/Filadélfia/NY/Toronto, EDT)   = -4
//  13-16 Oeste (Vancouver/Seattle/SF Bay/LA, PDT)                 = -7
const STADIUM_OFFSET={1:-6,2:-6,3:-6,4:-5,5:-5,6:-5,7:-4,8:-4,9:-4,10:-4,11:-4,12:-4,13:-7,14:-7,15:-7,16:-7};
const BRT_OFFSET=-3;  // UTC-3 (Brasília, sem horário de verão)
function kickParts(g){ // "MM/DD/YYYY HH:MM" no fuso do estádio -> {ts: instante UTC real, d, h em Brasília}
  const m=String(g.local_date||"").match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
  if(!m)return{ts:0,d:"",h:g.local_date||""};
  const[,mo,da,yr,hh,mi]=m;
  const so=(g.stadium_id in STADIUM_OFFSET)?STADIUM_OFFSET[g.stadium_id]:-4; // offset do estádio
  const utc=Date.UTC(+yr,+mo-1,+da,+hh,+mi)-so*3600000;        // relógio do estádio -> instante UTC
  const b=new Date(utc+BRT_OFFSET*3600000);                     // relógio de Brasília (lido via getUTC*)
  const pad=n=>String(n).padStart(2,"0");
  return{ts:utc,d:`${pad(b.getUTCDate())}/${pad(b.getUTCMonth()+1)}`,h:`${pad(b.getUTCHours())}:${pad(b.getUTCMinutes())}`};
}
const _WDAY=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
// chave + rótulo do dia (no fuso de Brasília) p/ agrupar o histórico
function kickDayInfo(g){
  const m=String(g.local_date||"").match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
  if(!m)return{key:"?",label:"Sem data"};
  const[,mo,da,yr,hh,mi]=m;
  const so=(g.stadium_id in STADIUM_OFFSET)?STADIUM_OFFSET[g.stadium_id]:-4;
  const b=new Date(Date.UTC(+yr,+mo-1,+da,+hh,+mi)-so*3600000+BRT_OFFSET*3600000);
  const pad=n=>String(n).padStart(2,"0");
  return{key:b.getUTCFullYear()+"-"+pad(b.getUTCMonth()+1)+"-"+pad(b.getUTCDate()),
    label:_WDAY[b.getUTCDay()]+" · "+pad(b.getUTCDate())+"/"+pad(b.getUTCMonth()+1)};
}

function buildGeral(){
  // baseT = como estava ANTES dos jogos de agora (acumulado + tudo que já encerrou)
  const baseT={};PLAYERS.forEach(p=>baseT[p]=(BASELINE[p]||0));
  GAMES.forEach(g=>{
    if(classify(g)!=="finished")return;const[ra,rb]=res(g);
    PLAYERS.forEach(p=>{const r=pts((GUESS[g.id]||{})[p],ra,rb,false);if(r.p!=null)baseT[p]+=r.p;});
  });
  // totals = AGORA (baseT + o que está rolando ao vivo)
  const totals={};PLAYERS.forEach(p=>totals[p]=baseT[p]);
  let anyLive=false;
  GAMES.forEach(g=>{
    if(classify(g)!=="live")return;anyLive=true;const[ra,rb]=res(g);
    PLAYERS.forEach(p=>{const r=pts((GUESS[g.id]||{})[p],ra,rb,true);if(r.p!=null)totals[p]+=r.p;});
  });
  // posição antes dos jogos ao vivo x agora -> setas em tempo real (paradas quando não há jogo ao vivo)
  const basePos={};
  compRanks(PLAYERS.map(p=>({p,v:baseT[p]})).sort((a,b)=>b.v-a.v),r=>r.v).forEach(r=>basePos[r.p]=r.rank);
  const rows=PLAYERS.map(p=>({p,t:totals[p]})).sort((a,b)=>b.t-a.t);
  compRanks(rows,r=>r.t);
  const card=document.createElement("div");card.className="card geral";
  const shb=document.createElement("button");shb.className="cardshare gershare";shb.type="button";
  shb.title="Compartilhar classificação";shb.innerHTML=icon("share",14);
  shb.onclick=()=>openShareModal(makeShareCanvas,"bolao-015-geral.png","Classificação geral");
  card.appendChild(shb);
  const sub=document.createElement("p");sub.className="sub";
  sub.textContent=anyLive?"Classificação ao vivo · setas = movimento desde antes dos jogos de agora":"Classificação atual · sem jogos ao vivo no momento";
  card.appendChild(sub);
  rows.forEach(r=>{
    const mv=basePos[r.p]-r.rank; // + = subiu
    const move=mv>0?`<span class="move up">▲${mv}</span>`:mv<0?`<span class="move down">▼${-mv}</span>`:`<span class="move flat">–</span>`;
    const d=document.createElement("div");d.className="rank"+(r.rank===1?" leader":"");
    d.innerHTML=`<span class="pos">${r.rank}</span>${avatarHTML(r.p,28)}<span class="who" style="color:${pColor(r.p)}">${r.p}</span>${move}<span class="pts">${r.t}</span>`;
    d.onclick=()=>openProfile(r.p);
    card.appendChild(d);
  });
  return card;
}

const GLETTERS=()=>[...new Set(GAMES.filter(g=>g.type==="group").map(g=>g.group))].sort();
const groupGames=L=>GAMES.filter(g=>g.type==="group"&&g.group===L);
const isFin=g=>String(g.finished).toUpperCase()==="TRUE";
function teamIdsOfGroup(L){const s=[];groupGames(L).forEach(g=>[g.home_team_id,g.away_team_id].forEach(id=>{if(!s.includes(id))s.push(id);}));return s;}
function groupResults(L,includeLive){
  const out=[];
  groupGames(L).forEach(g=>{const c=classify(g);
    if(c==="finished"||(includeLive&&c==="live"))out.push([g.home_team_id,g.away_team_id,parseInt(g.home_score)||0,parseInt(g.away_score)||0]);});
  return out;
}
function tableFromResults(ids,results){
  const t={};ids.forEach(id=>t[id]={id,P:0,W:0,D:0,L:0,GF:0,GA:0,J:0});
  results.forEach(([h,a,hs,as_])=>{if(!t[h]||!t[a])return;
    t[h].J++;t[a].J++;t[h].GF+=hs;t[h].GA+=as_;t[a].GF+=as_;t[a].GA+=hs;
    if(hs>as_){t[h].P+=3;t[h].W++;t[a].L++;}
    else if(hs<as_){t[a].P+=3;t[a].W++;t[h].L++;}
    else{t[h].P++;t[a].P++;t[h].D++;t[a].D++;}});
  ids.forEach(id=>t[id].GD=t[id].GF-t[id].GA);
  return t;
}
// ordena: pontos -> confronto direto (pts,saldo,gols) -> saldo geral -> gols geral
function orderGroup(ids,results){
  const tab=tableFromResults(ids,results);
  let order=[...ids].sort((a,b)=>tab[b].P-tab[a].P);
  const out=[];let i=0;
  while(i<order.length){let j=i;while(j+1<order.length&&tab[order[j+1]].P===tab[order[i]].P)j++;
    let grp=order.slice(i,j+1);
    if(grp.length>1){
      const h=tableFromResults(grp,results.filter(([x,y])=>grp.includes(x)&&grp.includes(y)));
      grp.sort((a,b)=>(h[b].P-h[a].P)||(h[b].GD-h[a].GD)||(h[b].GF-h[a].GF)||(tab[b].GD-tab[a].GD)||(tab[b].GF-tab[a].GF));
    }
    out.push(...grp);i=j+1;}
  return {order:out,tab};
}
function buildStandTable(L,compact,includeLive){
  const ids=teamIdsOfGroup(L);
  const {order,tab}=orderGroup(ids,groupResults(L,includeLive));
  const st=teamStatus(L);
  const t=document.createElement("table");t.className=compact?"lst":"gtable";
  if(!compact){const hr=document.createElement("tr");
    hr.innerHTML='<th></th><th class="l">Seleção</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th><th>P</th>';t.appendChild(hr);}

    const r=tab[id];const tr=document.createElement("tr");tr.className=i<2?"q1":i===2?"q3":"q4";
    const gd=(r.GD>0?"+":"")+r.GD;

    }else{
      tr.innerHTML=`<td class="pos">${i+1}</td><td class="tm"><span class="fx" data-goteam="${id}"><img src="${flag(+id,28)}" onerror="this.style.visibility='hidden'"><span class="nmt">${nm(+id)}</span>${badge}</span></td><td>${r.J}</td><td>${r.W}</td><td>${r.D}</td><td>${r.L}</td><td class="gd">${gd}</td><td class="pts">${r.P}</td>`;

}

// Classificação dos melhores terceiros (os 8 melhores avançam na Copa 2026).
// Critério oficial FIFA (Regulamento, Art. 13) entre os 12 terceiros — todos do mesmo "mini-grupo",
// então NÃO há confronto direto; usa-se o desempenho geral, nesta ordem:
//   1) pontos  2) saldo de gols  3) gols marcados  4) fair play (cartões)  5) ranking FIFA.
// O feed não traz cartões nem o ranking FIFA, então aplicamos os 3 primeiros (que decidem
// praticamente todos os casos); empate remanescente cai na ordem alfabética do grupo (estável).
let _thirds=null,_thirdsSig="";
function thirdsRanking(){
  const sig=GLETTERS().map(L=>groupSig(L)).join("#");
  if(_thirds&&_thirdsSig===sig)return _thirds;
  const rows=GLETTERS().map(L=>{
    const ids=teamIdsOfGroup(L);if(ids.length<3)return null;
    const {order,tab}=orderGroup(ids,groupResults(L,true)); // 3º de cada grupo (com confronto direto interno)
    const id=order[2];if(!id)return null;
    const r=tab[id];return {L,id,P:r.P,GD:r.GD,GF:r.GF,J:r.J};
  }).filter(Boolean);
  rows.sort((a,b)=>(b.P-a.P)||(b.GD-a.GD)||(b.GF-a.GF)||(a.L<b.L?-1:a.L>b.L?1:0));
  rows.forEach((r,i)=>r.q=i<8);
  _thirds=rows;_thirdsSig=sig;return rows;
}
const qualThirdSet=()=>new Set(thirdsRanking().filter(r=>r.q).map(r=>r.id));
// status matemático de cada seleção do grupo:
//  classificado = garantido (top 2, ou 3º já dentro num grupo encerrado)
//  eliminado    = sem chance (só pode terminar em 4º, ou 3º fora num grupo encerrado)
//  classificando= ainda pode, e hoje está entre os 8 melhores 3º
//  vivo         = ainda pode avançar
function teamStatus(L){
  const ids=teamIdsOfGroup(L);const qt=qualThirdSet();const out={};
  if(groupAllFinished(L)){
    const {order}=orderGroup(ids,groupResults(L,true));
    // top-2 garantidos; 4º eliminado; 3º depende dos outros grupos -> provisório
    order.forEach((id,i)=>{out[id]=i<2?"classificado":i===3?"eliminado":(qt.has(id)?"classificando":"vivo");});
    return out;
  }
  const s=scenarioCached(L);const all={};ids.forEach(t=>all[t]=new Set());
  if(s.mode==="grid")s.rows.forEach(r=>{for(let p=1;p<=4;p++)r.positions[p].forEach(t=>all[t].add(p));});
  else if(s.mode==="agg"){for(let p=1;p<=4;p++)s.positions[p].forEach(t=>all[t].add(p));}
  ids.forEach(t=>{const a=[...all[t]];
    if(a.length&&a.every(p=>p<=2))out[t]="classificado";
    else if(a.length&&a.every(p=>p>=4))out[t]="eliminado";
    else if(qt.has(t))out[t]="classificando";
    else out[t]="vivo";});
  return out;
}

  if(status==="classificado")return `<span class="qmark ok" title="Classificado">${icon("check",10)}</span>`;

  if(status==="classificando")return `<span class="qmark" title="Classificando (entre os 8 melhores 3º)">${icon("check",10)}</span>`;
  return "";
}

/* ===================== ESTATÍSTICAS / SELEÇÕES =====================

/* ===================== MATA-MATA (chaveamento) ===================== */
// traduz o rótulo de origem do feed (de onde vem cada time)
function ptKoLabel(raw){
  if(!raw)return "A definir";
  let m;
  if(m=raw.match(/^Winner Group (\w+)$/i))return "1º Grupo "+m[1];
  if(m=raw.match(/^Runner-?up Group (\w+)$/i))return "2º Grupo "+m[1];
  if(m=raw.match(/^3rd Group (.+)$/i))return "3º · "+m[1].replace(/\s+/g,"");
  if(m=raw.match(/^Winner Match (\d+)$/i))return "Venc. Jogo "+m[1];
  if(m=raw.match(/^Loser Match (\d+)$/i))return "Perd. Jogo "+m[1];
  return raw;
}
const parseSrc=label=>{const m=String(label||"").match(/Match (\d+)/i);return m?String(+m[1]):null;};
const winSrc=label=>{const m=String(label||"").match(/^Winner Match (\d+)$/i);return m?m[1]:null;}; // só "vencedor de"
const koHasTeams=g=>!!(g&&+g.home_team_id&&+g.away_team_id);
// vencedor já definido de um jogo encerrado (empate em mata-mata -> pênaltis, não modelado)
function koWinner(g){if(!g||classify(g)!=="finished")return 0;const a=parseInt(g.home_score)||0,b=parseInt(g.away_score)||0;return a>b?+g.home_team_id:b>a?+g.away_team_id:0;}
/* ===================== PREVIEW DO CHAVEAMENTO (embutido no card do Bolão) =====================
   Para um jogo de mata-mata, mostra ESTE jogo + o jogo IRMÃO (a outra origem do próximo confronto)
   e pra onde os vencedores vão: "quem vencer pega o vencedor do jogo X". */
function koContext(g){
  if(!g||g.type==="group")return null;
  const gid=String(g.id);
  let next=null,gSide=null,sibId=null;
  for(const x of GAMES){ if(x.type==="group")continue;
    if(winSrc(x.home_team_label)===gid){next=x;gSide="h";sibId=parseSrc(x.away_team_label);break;}
    if(winSrc(x.away_team_label)===gid){next=x;gSide="a";sibId=parseSrc(x.home_team_label);break;}
  }
  if(!next)return null; // a final não tem próximo confronto
  const sib=GAMES.find(x=>String(x.id)===String(sibId))||null;
  if(!sib)return null;
  return {next,sib,gSide};
}
// uma linha (time) de um card do mini-chaveamento — bandeira + nome + placar; rótulo de origem se indefinido
function koMiniRow(g,side){
  const id=side==="h"?g.home_team_id:g.away_team_id;
  const label=side==="h"?g.home_team_label:g.away_team_label;
  const sc=side==="h"?g.home_score:g.away_score, osc=side==="h"?g.away_score:g.home_score;
  const def=id&&id!=="0"&&TEAMS[+id];
  const c=classify(g),shown=(c==="finished"||c==="live");
  let cls="kt";
  if(shown&&def){const a=parseInt(sc)||0,b=parseInt(osc)||0;if(a>b)cls+=" win";else if(a<b)cls+=" lose";}
  if(!def)cls+=" tbd";
  const fl=def?`<img src="${flag(+id,22)}" onerror="this.style.visibility='hidden'">`:`<span class="ktf">${ICONS.flag}</span>`;
  const scEl=(shown&&def)?`<span class="kt-sc">${parseInt(sc)||0}</span>`:"";
  return `<div class="${cls}"><span class="kt-fl">${fl}</span><span class="kt-n">${def?nm(+id):ptKoLabel(label)}</span>${scEl}</div>`;
}
// conteúdo do canto do card: ao vivo / encerrado / data·hora (Brasília) — os jogos caem em dias diferentes
function koStateHTML(g){const c=classify(g);
  if(c==="live")return `<span class="kc-lv">● ${liveTxt(g)}</span>`;
  if(c==="finished")return `<span class="kc-fin">Fim</span>`;
  const k=kickParts(g);return `<span class="kc-soon">${k.d} · ${k.h}</span>`;}
function koMiniCard(g,role){
  const d=document.createElement("div");
  d.className="kcard"+(role==="this"?" is-this":"");
  const ttl=role==="this"?"Este jogo":("Jogo "+g.id);
  d.innerHTML=`<div class="kc-h"><span class="kc-t">${ttl}</span>${koStateHTML(g)}</div>`+koMiniRow(g,"h")+koMiniRow(g,"a");
  return d;
}
// card do próximo confronto: "Venc. deste jogo × Venc. Jogo irmão" (ou o time já definido)
function koNextCard(g,sib,next,gSide){
  const d=document.createElement("div");d.className="kcard is-next";
  const wThis=koWinner(g),wSib=koWinner(sib);
  const slot=(win,labelTxt)=>win
    ?`<div class="kt win"><span class="kt-fl"><img src="${flag(+win,22)}" onerror="this.style.visibility='hidden'"></span><span class="kt-n">${nm(+win)}</span></div>`
    :`<div class="kt tbd"><span class="kt-fl"><span class="ktf">${ICONS.trophy}</span></span><span class="kt-n">${labelTxt}</span></div>`;
  const rg=slot(wThis,"Venc. deste jogo"),rs=slot(wSib,"Venc. Jogo "+sib.id);
  const rows=gSide==="h"?(rg+rs):(rs+rg); // respeita a ordem mando/visitante do próximo jogo

// monta a árvore do mata-mata a partir dos rótulos do feed (id do jogo = nº oficial da partida)
function koTree(){
  const byId={};GAMES.forEach(g=>{if(g.type!=="group")byId[g.id]=g;});
  const sub=(id,acc)=>{if(!byId[id]||acc.has(id))return acc;acc.add(id);const g=byId[id];
    [parseSrc(g.home_team_label),parseSrc(g.away_team_label)].forEach(s=>{if(s)sub(s,acc);});return acc;};
  const top=sub("101",new Set()),bot=sub("102",new Set());
  const dfs=root=>{const ord={},n={v:0};(function go(id){if(!byId[id])return;ord[id]=n.v++;const g=byId[id];
    const h=parseSrc(g.home_team_label),a=parseSrc(g.away_team_label);if(h)go(h);if(a)go(a);})(root);return ord;};
  return {byId,top,bot,topOrd:dfs("101"),botOrd:dfs("102")};
}

function drawBracketLines(svg,bk,cardById,T){

      p.setAttribute("d","M"+cx+" "+cyc+" H"+midx+" V"+pyc+" H"+px);
      p.setAttribute("class","bkline");svg.appendChild(p);

}

/* ===================== CENÁRIOS DE CLASSIFICAÇÃO ===================== */
function scorelinesFor(o,N){const out=[];for(let h=0;h<=N;h++)for(let a=0;a<=N;a++){if((o==="H"&&h>a)||(o==="A"&&h<a)||(o==="D"&&h===a))out.push([h,a]);}return out;}
function cartesian(arrs){return arrs.reduce((acc,a)=>{const o=[];acc.forEach(p=>a.forEach(x=>o.push(p.concat([x]))));return o;},[[]]);}
function cmpKeyDesc(a,b){for(let i=0;i<a.length;i++){if(a[i]!==b[i])return b[i]-a[i];}return 0;}
function sameKey(a,b){for(let i=0;i<a.length;i++)if(a[i]!==b[i])return false;return true;}
// para um placar concreto: posições possíveis de cada time (faixa quando empate indecidível)
function rankWithTies(ids,results){
  const tab=tableFromResults(ids,results);
  let order=[...ids].sort((a,b)=>tab[b].P-tab[a].P);
  const fk={};let i=0;
  while(i<order.length){let j=i;while(j+1<order.length&&tab[order[j+1]].P===tab[order[i]].P)j++;
    const grp=order.slice(i,j+1);
    const h=tableFromResults(grp,results.filter(([x,y])=>grp.includes(x)&&grp.includes(y)));
    grp.forEach(t=>fk[t]=[tab[t].P,h[t].P,h[t].GD,h[t].GF,tab[t].GD,tab[t].GF]);
    i=j+1;}
  const srt=[...ids].sort((a,b)=>cmpKeyDesc(fk[a],fk[b]));
  const pos={};let idx=0;
  while(idx<srt.length){let j=idx;while(j+1<srt.length&&sameKey(fk[srt[j+1]],fk[srt[idx]]))j++;
    for(let k=idx;k<=j;k++){pos[srt[k]]=[];for(let p=idx+1;p<=j+1;p++)pos[srt[k]].push(p);}
    idx=j+1;}
  return pos;
}
function scenarioFor(L){
  const ids=teamIdsOfGroup(L);
  const base=groupGames(L).filter(isFin).map(g=>[g.home_team_id,g.away_team_id,parseInt(g.home_score)||0,parseInt(g.away_score)||0]);
  const rem=groupGames(L).filter(g=>!isFin(g)).sort((a,b)=>kickParts(a).ts-kickParts(b).ts);
  if(rem.length===0)return {mode:"final",ids};
  const N=6;
  // estado ATUAL (placar de agora): qual linha está ocorrendo + quem está em cada posição
  const curRes=base.concat(rem.map(g=>[g.home_team_id,g.away_team_id,parseInt(g.home_score)||0,parseInt(g.away_score)||0]));
  const curOrder=orderGroup(ids,curRes).order;const curPos={};curOrder.forEach((id,i)=>curPos[i+1]=id);
  const cur={outs:rem.map(g=>{const a=parseInt(g.home_score)||0,b=parseInt(g.away_score)||0;return a>b?"H":a<b?"A":"D";}),pos:curPos,live:rem.some(g=>classify(g)==="live")};
  if(rem.length<=2){
    const rows=cartesian(rem.map(()=>["H","D","A"])).map(outs=>{
      const acc={};ids.forEach(t=>acc[t]=new Set());
      cartesian(rem.map((g,gi)=>scorelinesFor(outs[gi],N))).forEach(combo=>{
        const res=base.concat(combo.map((sc,gi)=>[rem[gi].home_team_id,rem[gi].away_team_id,sc[0],sc[1]]));
        const p=rankWithTies(ids,res);
        ids.forEach(t=>(p[t]||[]).forEach(x=>acc[t].add(x)));
      });
      const positions={};for(let pp=1;pp<=4;pp++)positions[pp]=ids.filter(t=>acc[t].has(pp));
      return {outs,positions};
    });
    return {mode:"grid",rem,ids,rows,cur};
  }
  // rodadas anteriores: agrega todas as possibilidades por posição
  const n=rem.length<=3?4:(rem.length<=4?2:1);
  const slPer=rem.map(()=>["H","D","A"].reduce((o,x)=>o.concat(scorelinesFor(x,n)),[]));
  const acc={};ids.forEach(t=>acc[t]=new Set());
  cartesian(slPer).forEach(combo=>{
    const res=base.concat(combo.map((sc,gi)=>[rem[gi].home_team_id,rem[gi].away_team_id,sc[0],sc[1]]));
    const p=rankWithTies(ids,res);
    ids.forEach(t=>(p[t]||[]).forEach(x=>acc[t].add(x)));
  });
  const positions={};for(let pp=1;pp<=4;pp++)positions[pp]=ids.filter(t=>acc[t].has(pp));
  return {mode:"agg",ids,positions,rem,cur};
}
const sameOutcomes=(a,b)=>!!a&&!!b&&a.length===b.length&&a.every((x,i)=>x===b[i]);
let scnCache={};
const groupSig=L=>groupGames(L).map(g=>g.id+classify(g)+g.home_score+"-"+g.away_score).join("|");
function scenarioCached(L){const s=groupSig(L);if(scnCache[L]&&scnCache[L].s===s)return scnCache[L].v;const v=scenarioFor(L);scnCache[L]={s,v};return v;}
// "O que está em jogo": para o jogo g, as posições possíveis de cada um dos 2 times
// conforme ESTE jogo termine em vitória/empate/derrota (marginalizando os outros jogos do grupo)
function stakesFor(L,g){
  const ids=teamIdsOfGroup(L);
  const base=groupGames(L).filter(isFin).map(x=>[x.home_team_id,x.away_team_id,parseInt(x.home_score)||0,parseInt(x.away_score)||0]);
  const rem=groupGames(L).filter(x=>!isFin(x)).sort((a,b)=>kickParts(a).ts-kickParts(b).ts);
  const gi=rem.findIndex(x=>String(x.id)===String(g.id));
  if(gi<0)return null;
  const N=6;
  const slLists=rem.map(()=>{const o=[];for(let h=0;h<=N;h++)for(let a=0;a<=N;a++)o.push([h,a]);return o;});
  const home=g.home_team_id,away=g.away_team_id;
  const acc={};[home,away].forEach(t=>acc[t]={H:new Set(),D:new Set(),A:new Set()});
  cartesian(slLists).forEach(combo=>{
    const res=base.concat(combo.map((sc,i)=>[rem[i].home_team_id,rem[i].away_team_id,sc[0],sc[1]]));
    const gs=combo[gi];const oc=gs[0]>gs[1]?"H":gs[0]<gs[1]?"A":"D";
    const pos=rankWithTies(ids,res);
    [home,away].forEach(t=>(pos[t]||[]).forEach(p=>acc[t][oc].add(p)));
  });
  return {home,away,acc};
}

function stakesCached(L,g){const k=L+":"+g.id,sig=groupSig(L);if(stkCache[k]&&stkCache[k].s===sig)return stkCache[k].v;const v=stakesFor(L,g);stkCache[k]={s:sig,v};return v;}

// "{\"Nestory Irankunda 27'\",\"C. Metcalfe 45+2'\"}" -> [{side,name,min}]
function parseScorers(raw,side){
  if(!raw||raw==="null"||raw==='"null"'||raw==="{}"||raw==="")return [];
  const items=[];const re=/"([^"]*)"/g;let m;while(m=re.exec(raw))items.push(m[1]);
  let list=items.length?items:(raw.indexOf("{")<0?[raw]:[]);
  return list.map(it=>{
    const mm=it.match(/(\d+)(?:\+(\d+))?\s*'?\s*$/);
    const min=mm?(+mm[1]+(mm[2]?(+mm[2])/100:0)):999;
    const name=(mm?it.slice(0,mm.index):it).replace(/[,'"\s]+$/,"").trim();
    return {side,name,min};
  });
}

function fmtBRT(ms){if(!ms)return "";const b=new Date(ms+BRT_OFFSET*3600000);const pad=n=>String(n).padStart(2,"0");
  return pad(b.getUTCDate())+"/"+pad(b.getUTCMonth()+1)+" · "+pad(b.getUTCHours())+":"+pad(b.getUTCMinutes());}
// um frame por GOL (placar do jogo evolui gol a gol); começa no 1º palpite do bolão
function raceFrames(){
  const games=GAMES.filter(g=>(classify(g)==="finished"||classify(g)==="live")&&hasAnyGuess(g.id));
  const evs=[];
  games.forEach(g=>{
    const kts=kickParts(g).ts;
    const gs=parseScorers(g.home_scorers,"H").concat(parseScorers(g.away_scorers,"A")).sort((a,b)=>a.min-b.min);
    const fh=parseInt(g.home_score)||0,fa=parseInt(g.away_score)||0;
    if(!gs.length){evs.push({g,abs:kts,min:null,scorer:null,h:fh,a:fa});}
    else{let h=0,a=0;gs.forEach((go,i)=>{if(go.side==="H")h++;else a++;const last=i===gs.length-1;
      evs.push({g,abs:kts+go.min*60000,min:go.min,scorer:go,h:last?fh:h,a:last?fa:a});});}
  });
  evs.sort((x,y)=>x.abs-y.abs);
  const cum={};PLAYERS.forEach(p=>cum[p]=(BASELINE[p]||0));
  const gp={};
  const frames=[{start:true,totals:{...cum}}];
  evs.forEach(ev=>{
    const g=ev.g,np={};
    PLAYERS.forEach(p=>{const r=pts((GUESS[g.id]||{})[p],ev.h,ev.a,false);np[p]=(r.p!=null?r.p:0);});
    const old=gp[g.id]||{};PLAYERS.forEach(p=>cum[p]+=np[p]-(old[p]||0));gp[g.id]=np;
    frames.push({hid:g.home_team_id,aid:g.away_team_id,h:ev.h,a:ev.a,min:ev.min,scorer:ev.scorer,
      abs:ev.abs,group:g.group,live:classify(g)==="live",totals:{...cum}});
  });
  return frames;
}

/* ===================== GRÁFICO DE LINHAS + PERFIL ===================== */
const ROUND_NM={r32:"16-avos",r16:"Oitavas",qf:"Quartas",sf:"Semis",third:"3º lugar",final:"Final"};
// SVG de linhas: uma linha por jogador (cor fixa). opts.focus realça 1 jogador e apaga os outros.
function lineChartSVG(frames,players,opts){
  opts=opts||{};const W=opts.w||340,H=opts.h||196;
  const endlab=opts.endlabels!==false;                 // avatar + nome no fim de cada linha
  const endD=opts.endD||(opts.focus?18:14);            // tamanho do avatar no fim
  const endFs=opts.endFs||(opts.focus?10:9);           // fonte do nome no fim
  const axisFs=opts.axisFs||8;                         // fonte dos números dos eixos
  const thick=opts.thick||1.6;                         // espessura das linhas
  const nameMax=Math.max(4,...players.map(p=>p.length));
  const PL=Math.max(24,Math.round(axisFs*2.6)),PT=12,PB=opts.xlabels?(axisFs+12):12;
  const PR=endlab?Math.round(endD+8+nameMax*endFs*0.6+6):12; // espaço reservado p/ os rótulos à direita
  const iw=W-PL-PR,ih=H-PT-PB,n=frames.length;

  frames.forEach(f=>players.forEach(p=>{const v=f.totals[p];if(v<mn)mn=v;if(v>mx)mx=v;}));
  if(!isFinite(mn)){mn=0;mx=1;}if(mx===mn)mx+=1;
  const padv=(mx-mn)*0.08;mn=Math.floor(mn-padv);mx=Math.ceil(mx+padv);
  const X=i=>PL+(n<=1?0:(i/(n-1))*iw),Y=v=>PT+ih-((v-mn)/(mx-mn))*ih;
  let grid="";const ticks=4;
  for(let t=0;t<=ticks;t++){const val=mn+(mx-mn)*t/ticks,yy=Y(val);
    grid+=`<line x1="${PL}" y1="${yy.toFixed(1)}" x2="${(W-PR).toFixed(1)}" y2="${yy.toFixed(1)}" stroke="rgba(255,255,255,.06)"/>`;
    grid+=`<text x="${PL-5}" y="${(yy+axisFs*0.34).toFixed(1)}" text-anchor="end" font-size="${axisFs}" fill="#7e8b99">${Math.round(val)}</text>`;}
  const ordered=opts.focus?players.filter(p=>p!==opts.focus).concat([opts.focus]):players;
  const up=opts.upTo!=null?Math.max(0,Math.min(opts.upTo,n-1)):null;
  const endI=up!=null?up:n-1;

  let lines="";
  ordered.forEach(p=>{const isF=!opts.focus||opts.focus===p,c=colOf(p),w=isF?thick:Math.max(1,thick*0.6);
    let dF="";frames.forEach((f,i)=>{dF+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(f.totals[p]).toFixed(1)+" ";});
    if(up!=null){

      let dR="";for(let i=0;i<=up;i++)dR+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(frames[i].totals[p]).toFixed(1)+" ";
      lines+=`<path d="${dR}" fill="none" stroke="${c}" stroke-width="${w}" opacity="${isF?1:.7}" stroke-linejoin="round" stroke-linecap="round"/>`;
    }else{
      lines+=`<path d="${dF}" fill="none" stroke="${c}" stroke-width="${w}" opacity="${isF?1:.55}" stroke-linejoin="round" stroke-linecap="round"/>`;
    }});
  // linha da média do bolão (tracejada) — comparação no perfil
  let ends="";
  if(opts.avg){
    let dA="";for(let i=0;i<n;i++){const av=players.reduce((s,p)=>s+frames[i].totals[p],0)/players.length;dA+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(av).toFixed(1)+" ";}
    lines+=`<path d="${dA}" fill="none" stroke="#9aa7b4" stroke-width="${Math.max(1.2,thick*0.7)}" stroke-dasharray="6 4" opacity=".85"/>`;
    const av=players.reduce((s,p)=>s+frames[endI].totals[p],0)/players.length;
    ends+=`<text x="${(X(endI)+5).toFixed(1)}" y="${(Y(av)+endFs*0.34).toFixed(1)}" font-size="${endFs}" font-weight="700" fill="#9aa7b4" paint-order="stroke" stroke="#0B0F14" stroke-width="2.6" stroke-linejoin="round">média</text>`;
  }
  // rótulos no fim: avatar (no lugar da bolinha) + nome, com de-colisão vertical p/ não sobrepor
  if(endlab){

    const over=items.length?items[items.length-1].ly-(PT+ih):0;if(over>0)items.forEach(it=>it.ly-=over);

      ends+=`<svg x="${ax.toFixed(1)}" y="${(it.ly-endD/2).toFixed(1)}" width="${endD}" height="${endD}" viewBox="0 0 100 100">${avatarInner(it.p)}</svg>`;

    });

  let xl="";if(opts.xlabels){xl=`<text x="${PL}" y="${H-5}" font-size="${axisFs}" fill="#7e8b99">${opts.xlabels[0]}</text>`+
    `<text x="${(W-PR).toFixed(1)}" y="${H-5}" text-anchor="end" font-size="${axisFs}" fill="#7e8b99">${opts.xlabels[1]}</text>`;}
  return `<svg viewBox="0 0 ${W} ${H}" class="linechart" style="width:100%;height:auto;font-family:Inter,sans-serif">${grid}${lines}${head}${ends}${xl}</svg>`;
}
